<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRS IDE</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:monospace; background:#1e1e1e; color:#d4d4d4; height:100vh; display:flex; flex-direction:column; }
        .toolbar { background:#333; padding:10px 15px; display:flex; gap:8px; align-items:center; }
        .toolbar button { background:#444; color:#ccc; border:none; padding:6px 14px; cursor:pointer; font-size:13px; border-radius:4px; }
        .toolbar button:hover { background:#555; }
        .toolbar span { color:#888; margin-left:15px; font-size:13px; }
        .editor-area { flex:1; display:flex; overflow:hidden; }
        .line-numbers { background:#1e1e1e; color:#555; padding:12px 8px; text-align:right; font-size:14px; line-height:1.6; width:40px; overflow:hidden; border-right:1px solid #333; }
        textarea { flex:1; background:#1e1e1e; color:#d4d4d4; border:none; padding:12px 10px; font-family:monospace; font-size:14px; line-height:1.6; resize:none; outline:none; }
        .run-btn { position:fixed; bottom:25px; right:25px; width:55px; height:55px; border-radius:50%; background:#007acc; color:#fff; border:none; font-size:26px; cursor:pointer; box-shadow:0 4px 15px rgba(0,122,204,0.5); z-index:100; }
        .preview { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; flex-direction:column; }
        .preview.active { display:flex; }
        .preview-bar { background:#333; padding:8px 15px; display:flex; justify-content:flex-end; gap:10px; }
        .preview-bar button { background:#e74c3c; color:#fff; border:none; padding:6px 14px; cursor:pointer; border-radius:4px; }
        .preview-bar .dl { background:#2ecc71; }
        iframe { flex:1; border:none; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="newFile()">📄 Новый</button>
    <button onclick="save()">💾 Сохранить</button>
    <button onclick="downloadHtml()">📥 HTML</button>
    <span id="filename">untitled.crs</span>
</div>

<div class="editor-area">
    <div class="line-numbers" id="lineNumbers">1</div>
    <textarea id="editor"><CURSED-CODING>
<c.title>Привет!</c.title>
<c.text>Это KRS</c.text>
<c.button>Нажми</c.button>
</CCURSED-CODING></textarea>
</div>

<button class="run-btn" onclick="run()">▶</button>

<div class="preview" id="preview">
    <div class="preview-bar">
        <button class="dl" onclick="downloadHtml()">📥 Скачать</button>
        <button onclick="closePreview()">✕</button>
    </div>
    <iframe id="previewFrame"></iframe>
</div>

<script>
var currentFile = 'untitled.crs';
var files = JSON.parse(localStorage.getItem('krs_files') || '{}');
var lastHtml = '';

document.getElementById('editor').addEventListener('input', updateLines);
document.getElementById('editor').addEventListener('scroll', function() {
    document.getElementById('lineNumbers').scrollTop = this.scrollTop;
});

function updateLines() {
    var lines = document.getElementById('editor').value.split('\n');
    var nums = '';
    for (var i=1; i<=lines.length; i++) nums += i + '\n';
    document.getElementById('lineNumbers').textContent = nums;
}

function compile(code) {
    code = code.replace(/<CURSED-CODING>/gi,'').replace(/<\/CCURSED-CODING>/gi,'');
    
    var styles = '';
    code = code.replace(/<c\.style>([\s\S]*?)<\/c\.style>/gi, function(m, c) {
        var css = '';
        var blocks = c.match(/([#.\w-]+)\s*\{([^}]*)\}/g);
        if (blocks) {
            blocks.forEach(function(b) {
                var sel = b.match(/([#.\w-]+)\s*\{/)[1];
                var body = b.match(/\{([^}]*)\}/)[1];
                css += sel + '{';
                body.split('\n').forEach(function(l) {
                    l = l.trim();
                    if (l.includes('=')) {
                        var p = l.split('=');
                        var prop = p[0].trim().replace('фон','background').replace('цвет','color').replace('отступ','padding').replace('углы','border-radius').replace('ширина','width').replace('высота','height').replace('тень','box-shadow').replace('шрифт','font-size');
                        var val = p[1].trim();
                        var cols = {'синий':'#2196F3','тёмно-синий':'#1565C0','красный':'#f44336','зелёный':'#4CAF50','фиолетовый':'#7c3aed','белый':'#fff','чёрный':'#000','жёлтый':'#ffc107','оранжевый':'#ff9800','розовый':'#e91e63','серый':'#9e9e9e'};
                        for (var k in cols) val = val.replace(k, cols[k]);
                        css += prop + ':' + val + ';';
                    }
                });
                css += '}';
            });
        }
        styles += css;
        return '';
    });
    
    var scripts = '';
    code = code.replace(/<c\.script>([\s\S]*?)<\/c\.script>/gi, function(m, c) {
        scripts += '<script>' + c + '<\/script>';
        return '';
    });
    
    var tags = [
        ['title','h1 class="crs-title"'],['subtitle','h2 class="crs-subtitle"'],['heading','h3 class="crs-heading"'],
        ['text','p class="crs-text"'],['span','span'],['card','div class="crs-card"'],['box','div class="crs-box"'],
        ['grid','div class="crs-grid"'],['flex','div class="crs-flex"'],['center','div class="crs-center"'],
        ['container','div class="crs-container"'],['button','button class="crs-btn"'],
        ['input','input class="crs-input" placeholder="'],['textarea','textarea class="crs-textarea" placeholder="'],
        ['select','select class="crs-select"'],['option','option'],
        ['checkbox','label class="crs-checkbox"><input type="checkbox"> '],
        ['radio','label class="crs-radio"><input type="radio"> '],
        ['number','input type="number" class="crs-number" placeholder="'],['date','input type="date" class="crs-date"'],
        ['time','input type="time" class="crs-time"'],['color','input type="color" class="crs-color" value="'],
        ['range','input type="range" class="crs-range" value="'],['email','input type="email" class="crs-input" placeholder="'],
        ['password','input type="password" class="crs-input" placeholder="'],['search','input type="search" class="crs-input" placeholder="'],
        ['image','img class="crs-image" src="'],['video','video class="crs-video" src="'],
        ['audio','audio class="crs-audio" src="'],['link','a class="crs-link" href="'],
        ['iframe','iframe class="crs-iframe" src="'],['svg','svg'],
        ['list','ul class="crs-list"'],['olist','ol class="crs-olist"'],['item','li'],['menu','menu'],
        ['table','table class="crs-table"'],['row','tr'],['header','th'],['cell','td'],
        ['badge','span class="crs-badge"'],['mark','mark'],['code','pre class="crs-code"><code>'],
        ['alert','div class="crs-alert"'],['progress','progress class="crs-progress" value="'],
        ['tooltip','span class="crs-tooltip" title="'],['quote','blockquote'],['divider','hr'],
        ['details','details class="crs-details"'],['summary','summary'],
        ['spacer','div style="height:'],['br','br'],
        ['header_section','header'],['footer_section','footer'],['nav','nav'],
        ['section','section'],['aside','aside'],
        ['meter','meter value="'],['output','output'],
        ['button_link','a class="crs-btn" href="'],['file','input type="file"'],
        ['hidden','input type="hidden" value="'],['html','']
    ];
    
    for (var i = 0; i < tags.length; i++) {
        var t = tags[i][0], h = tags[i][1];
        var close = '</' + h.split(' ')[0] + '>';
        
        if (['input','number','email','password','search'].indexOf(t) >= 0) {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1">');
        } else if (['image','video','audio','link','iframe','color','range','button_link','hidden'].indexOf(t) >= 0) {
            var cl = (t==='audio'||t==='video') ? close : (t==='link'||t==='button_link') ? '</a>' : '';
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1">' + cl);
        } else if (t === 'checkbox' || t === 'radio') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1</label>');
        } else if (t === 'code') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1</code></pre>');
        } else if (t === 'tooltip') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1">$1</span>');
        } else if (t === 'progress' || t === 'meter') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1" max="100">' + close);
        } else if (t === 'spacer') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1px;"></div>');
        } else if (t === 'br' || t === 'file' || t === 'divider') {
            code = code.replace(new RegExp('<c\\.' + t + '>.*?</c\\.' + t + '>', 'gi'), '<' + h + '>');
        } else if (t === 'html') {
            code = code.replace(new RegExp('<c\\.' + t + '>([\\s\\S]*?)</c\\.' + t + '>', 'gi'), '$1');
        } else if (t === 'svg') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '>$1</svg>');
        } else if (t === 'date' || t === 'time') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '>');
        } else {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '>$1' + close);
        }
    }
    
    var baseCSS = '*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;padding:20px}.crs-title{font-size:32px;color:#7c3aed;margin:10px 0}.crs-subtitle{font-size:24px;color:#555}.crs-heading{font-size:18px}.crs-text{font-size:16px}.crs-btn{background:#7c3aed;color:#fff;padding:12px 24px;border:none;border-radius:12px;cursor:pointer;margin:5px;display:inline-block;text-decoration:none}.crs-input{padding:12px;border:1px solid #ccc;border-radius:8px;width:100%;margin:5px 0;font-size:16px}.crs-card{background:#f5f5f5;padding:20px;border-radius:15px;margin:10px 0}.crs-box{border:1px solid #ddd;padding:20px;border-radius:12px;margin:10px 0}.crs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}.crs-flex{display:flex;gap:15px;flex-wrap:wrap}.crs-center{text-align:center}.crs-container{max-width:1200px;margin:0 auto}.crs-badge{background:#7c3aed;color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;display:inline-block}.crs-alert{background:#fff3cd;border-left:4px solid #ffc107;padding:15px;margin:10px 0}.crs-code{background:#1e1e1e;color:#d4d4d4;padding:15px;border-radius:8px;font-family:monospace}.crs-table{border-collapse:collapse;width:100%}.crs-table td,.crs-table th{border:1px solid #ddd;padding:8px}.crs-table th{background:#f5f5f5}.crs-image{max-width:100%;border-radius:12px}.crs-video,.crs-audio{max-width:100%}.crs-link{color:#007acc}.crs-textarea{padding:12px;border:1px solid #ccc;border-radius:8px;width:100%;resize:vertical;min-height:100px}.crs-select{padding:12px;border:1px solid #ccc;border-radius:8px;width:100%}.crs-checkbox,.crs-radio{display:block;margin:5px 0}.crs-progress{width:100%}.crs-tooltip{border-bottom:1px dotted #666;cursor:help}blockquote{border-left:4px solid #7c3aed;padding:10px 20px;margin:10px 0;background:#f9f9f9}header,footer{background:#333;color:#fff;padding:20px}nav{background:#555;color:#fff;padding:10px}section{padding:20px;margin:10px 0}aside{background:#f5f5f5;padding:15px;border-radius:10px}.crs-audio{width:100%}';
    
    return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KRS App</title><style>' + baseCSS + styles + '</style></head><body>' + code + scripts + '</body></html>';
}

function save() {
    var code = document.getElementById('editor').value;
    var name = prompt('Имя файла:', currentFile);
    if (!name) return;
    if (!name.endsWith('.crs')) name += '.crs';
    files[name] = code;
    localStorage.setItem('krs_files', JSON.stringify(files));
    currentFile = name;
    document.getElementById('filename').textContent = name;
}

function newFile() {
    if (document.getElementById('editor').value && !confirm('Сохранить?')) return;
    document.getElementById('editor').value = '<CURSED-CODING>\n\n</CCURSED-CODING>';
    currentFile = 'untitled.crs';
    document.getElementById('filename').textContent = 'untitled.crs';
    updateLines();
}

function run() {
    lastHtml = compile(document.getElementById('editor').value);
    document.getElementById('previewFrame').srcdoc = lastHtml;
    document.getElementById('preview').classList.add('active');
}

function closePreview() {
    document.getElementById('preview').classList.remove('active');
}

function downloadHtml() {
    lastHtml = compile(document.getElementById('editor').value);
    var blob = new Blob([lastHtml], {type: 'text/html'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = currentFile.replace('.crs', '.html');
    a.click();
}

updateLines();
</script>
</body>
</html>
