<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS Language Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8ecf2;
            font-family: 'Courier New', 'Consolas', monospace;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border: 1px solid #aaa;
        }

        .header {
            background: #d9dfe8;
            padding: 10px 16px;
            border-bottom: 1px solid #999;
            font-weight: bold;
            font-size: 1.3rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .header span {
            font-size: 0.8rem;
            background: #f0f2f5;
            padding: 2px 8px;
            border: 1px solid #888;
        }

        .workspace {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
        }

        .editor-panel {
            flex: 1.2;
            min-width: 450px;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
        }

        .editor-header {
            background: #eef2f7;
            padding: 6px 12px;
            border-bottom: 1px solid #bbb;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }

        .line-count-info {
            font-weight: normal;
            color: #555;
        }

        .editor-with-lines {
            display: flex;
            background: #fefef7;
            border-bottom: 1px solid #ccc;
        }

        .line-numbers {
            background: #f0f2f5;
            padding: 12px 8px;
            text-align: right;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #888;
            border-right: 1px solid #ddd;
            user-select: none;
            min-width: 45px;
        }

        .line-numbers div {
            white-space: pre;
        }

        textarea {
            width: 100%;
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 13px;
            padding: 12px;
            border: none;
            background: #fefef7;
            resize: vertical;
            line-height: 1.5;
            min-height: 450px;
            outline: none;
        }

        textarea:focus {
            background: #fffdf0;
        }

        .button-bar {
            padding: 10px 12px;
            background: #eef2f7;
            border-top: 1px solid #ccc;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #e0e5ec;
            border: 1px solid #8a9cb0;
            padding: 6px 16px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        button:hover {
            background: #d0d8e4;
        }

        .output-panel {
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .output-header {
            background: #eef2f7;
            padding: 6px 12px;
            border-bottom: 1px solid #bbb;
            font-weight: bold;
        }

        .render-area {
            padding: 16px;
            background: white;
            min-height: 500px;
            overflow-y: auto;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        .error-box {
            background: #fff0ee;
            border-left: 5px solid #c00;
            padding: 10px 12px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #a00;
            margin: 0 0 8px 0;
            white-space: pre-wrap;
        }

        .footnote {
            background: #eef2f7;
            border-top: 1px solid #bbb;
            padding: 6px;
            text-align: center;
            font-size: 0.7rem;
            color: #555;
        }
        
        code {
            background: #f4f4f4;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>CRS LANGUAGE EXPLORER</div>
        <span>&lt;CURSED-CODING&gt; ... &lt;/CCURSED-CODING&gt;</span>
    </div>
    <div class="workspace">
        <div class="editor-panel">
            <div class="editor-header">
                <span>РЕДАКТОР CRS</span>
                <span class="line-count-info" id="lineCountInfo">строк: 0</span>
            </div>
            <div class="editor-with-lines">
                <div class="line-numbers" id="lineNumbers"></div>
                <textarea id="crsCode" rows="18" wrap="off"></textarea>
            </div>
            <div class="button-bar">
                <button id="runBtn">ЗАПУСТИТЬ</button>
                <button id="resetExample">ПРИМЕР</button>
                <button id="clearOutput">ОЧИСТИТЬ</button>
            </div>
        </div>
        <div class="output-panel">
            <div class="output-header">РЕЗУЛЬТАТ</div>
            <div id="errorPanel" class="error-box" style="display: none;"></div>
            <div id="renderContainer" class="render-area"></div>
        </div>
    </div>
    <div class="footnote">
        CRS Language Explorer — синтаксис: &lt;c.команда&gt; ... &lt;cc.команда&gt;
    </div>
</div>

<script>
    const editor = document.getElementById('crsCode');
    const renderDiv = document.getElementById('renderContainer');
    const errorPanel = document.getElementById('errorPanel');
    const lineNumbersDiv = document.getElementById('lineNumbers');
    const lineCountInfo = document.getElementById('lineCountInfo');

    function updateLineNumbers() {
        const code = editor.value;
        const lines = code.split(/\r?\n/);
        const lineCount = lines.length;
        lineCountInfo.textContent = `строк: ${lineCount}`;
        
        let numbersHtml = '';
        for (let i = 1; i <= lineCount; i++) {
            numbersHtml += `<div>${i}</div>`;
        }
        lineNumbersDiv.innerHTML = numbersHtml;
    }

    function syncScroll() {
        editor.addEventListener('scroll', function() {
            lineNumbersDiv.scrollTop = editor.scrollTop;
        });
    }

    editor.addEventListener('input', updateLineNumbers);
    editor.addEventListener('keydown', updateLineNumbers);
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showError(message, lineNumber) {
        errorPanel.style.display = 'block';
        errorPanel.innerHTML = `ОШИБКА (строка ${lineNumber}): ${escapeHtml(message)}`;
        renderDiv.innerHTML = `<div style="background:#ffe6e5; padding:20px; color:#b00;">Ошибка: ${escapeHtml(message)} (строка ${lineNumber})</div>`;
    }

    function hideError() {
        errorPanel.style.display = 'none';
    }

    class CRSParser {
        constructor(sourceCode) {
            this.rawSource = sourceCode;
            this.lines = sourceCode.split(/\r?\n/);
            this.error = null;
            this.errorLine = null;
        }

        findLineNumberByCharPos(charPos) {
            if (charPos < 0) return 1;
            let line = 1;
            let pos = 0;
            for (let i = 0; i < this.lines.length; i++) {
                if (charPos <= pos + this.lines[i].length) return line;
                pos += this.lines[i].length + 1;
                line++;
            }
            return line;
        }

        setError(msg, charPosition) {
            this.error = msg;
            this.errorLine = this.findLineNumberByCharPos(charPosition);
        }

        parseAndRender() {
            const openTag = "<CURSED-CODING>";
            const closeTag = "</CCURSED-CODING>";
            const src = this.rawSource;
            
            const openIdx = src.indexOf(openTag);
            const closeIdx = src.indexOf(closeTag);
            
            if (openIdx === -1) {
                this.setError("Отсутствует <CURSED-CODING>", 0);
                return null;
            }
            if (closeIdx === -1 || closeIdx < openIdx) {
                this.setError("Отсутствует </CCURSED-CODING>", src.length);
                return null;
            }
            
            const inner = src.substring(openIdx + openTag.length, closeIdx);
            if (inner.trim() === "") {
                this.setError("Код пуст", openIdx + openTag.length);
                return null;
            }
            
            return this.parseInnerContent(inner);
        }
        
        parseInnerContent(content) {
            let collectedStyles = [];
            let collectedScripts = [];
            let resultHtml = "";
            let i = 0;
            const len = content.length;
            
            const findCloseTag = (startPos, tagName) => {
                const closeRegex = new RegExp(`<cc\\.${tagName}>`, 'i');
                const slice = content.substring(startPos);
                const match = slice.match(closeRegex);
                if (!match) {
                    this.setError(`Нет закрывающего <cc.${tagName}>`, startPos);
                    return null;
                }
                const closeStart = startPos + match.index;
                const innerVal = content.substring(startPos, closeStart);
                const nextPos = closeStart + match[0].length;
                return { innerVal, nextPos };
            };
            
            while (i < len) {
                const openMatch = content.substring(i).match(/<c\.([a-zA-Z]+)>/);
                if (!openMatch) {
                    const rest = content.substring(i);
                    if (rest.trim().length > 0) {
                        resultHtml += `<span style="opacity:0.5;">${escapeHtml(rest)}</span>`;
                    }
                    break;
                }
                
                const tagName = openMatch[1].toLowerCase();
                const fullTag = openMatch[0];
                const tagStart = i + openMatch.index;
                const innerStart = tagStart + fullTag.length;
                
                const closed = findCloseTag(innerStart, tagName);
                if (!closed) return null;
                
                const innerRaw = closed.innerVal;
                const nextIdx = closed.nextPos;
                
                switch (tagName) {
                    case 'button':
                        resultHtml += `<button style="background:#eef; border:1px solid #88a; padding:5px 12px; margin:3px; cursor:pointer;">${escapeHtml(innerRaw.trim())}</button>`;
                        break;
                    case 'text':
                        resultHtml += `<div>${escapeHtml(innerRaw)}</div>`;
                        break;
                    case 'box': {
                        const innerParsed = this.parseInnerContent(innerRaw);
                        if (innerParsed === null && this.error) return null;
                        resultHtml += `<div style="border:1px solid #ccc; padding:12px; margin:8px 0; background:#fafcff;">${innerParsed.html}</div>`;
                        break;
                    }
                    case 'input':
                        resultHtml += `<input type="text" placeholder="${escapeHtml(innerRaw.trim())}" style="padding:5px; border:1px solid #aaa; margin:4px 0; width:100%;">`;
                        break;
                    case 'link': {
                        let url = "#", linkText = "ссылка";
                        const parts = innerRaw.split('|');
                        if (parts.length >= 2) { url = parts[0].trim(); linkText = parts.slice(1).join('|').trim(); }
                        else linkText = innerRaw.trim();
                        resultHtml += `<a href="${escapeHtml(url)}" target="_blank" style="color:#256; text-decoration:underline;">${escapeHtml(linkText)}</a>`;
                        break;
                    }
                    case 'image': {
                        let src = "", alt = "";
                        const parts = innerRaw.split('|');
                        src = parts[0].trim();
                        alt = parts.length > 1 ? parts[1].trim() : "img";
                        resultHtml += `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" style="max-width:100%; margin:6px 0;">`;
                        break;
                    }
                    case 'title':
                        resultHtml += `<h2 style="margin:12px 0 6px;">${escapeHtml(innerRaw)}</h2>`;
                        break;
                    case 'style':
                        collectedStyles.push(innerRaw);
                        break;
                    case 'script':
                        collectedScripts.push(innerRaw);
                        break;
                    case 'html':
                        resultHtml += innerRaw;
                        break;
                    case 'list': {
                        const innerParsed = this.parseInnerContent(innerRaw);
                        if (innerParsed === null && this.error) return null;
                        resultHtml += `<ul style="margin:8px 0 8px 20px;">${innerParsed.html}</ul>`;
                        break;
                    }
                    case 'item': {
                        const innerParsed = this.parseInnerContent(innerRaw);
                        if (innerParsed === null && this.error) return null;
                        resultHtml += `<li>${innerParsed.html}</li>`;
                        break;
                    }
                    case 'grid': {
                        const innerParsed = this.parseInnerContent(innerRaw);
                        if (innerParsed === null && this.error) return null;
                        resultHtml += `<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin:10px 0;">${innerParsed.html}</div>`;
                        break;
                    }
                    case 'card': {
                        const innerParsed = this.parseInnerContent(innerRaw);
                        if (innerParsed === null && this.error) return null;
                        resultHtml += `<div style="border:1px solid #bcd; border-radius:12px; padding:14px; background:#fff; margin:10px 0;">${innerParsed.html}</div>`;
                        break;
                    }
                    case 'badge':
                        resultHtml += `<span style="background:#d4e0ec; padding:3px 10px; border-radius:20px; font-size:0.75rem; margin:2px; display:inline-block;">${escapeHtml(innerRaw)}</span>`;
                        break;
                    case 'icon':
                        resultHtml += `<span style="font-size:1.2rem;">${escapeHtml(innerRaw)}</span>`;
                        break;
                    case 'progress':
                        let val = parseFloat(innerRaw.trim()) || 0;
                        resultHtml += `<progress value="${Math.min(100,Math.max(0,val))}" max="100" style="width:100%;"></progress>`;
                        break;
                    case 'alert':
                        resultHtml += `<div style="background:#fff3cd; border-left:5px solid #ffc107; padding:10px; margin:8px 0;">${escapeHtml(innerRaw)}</div>`;
                        break;
                    case 'modal': {
                        const innerParsed = this.parseInnerContent(innerRaw);
                        if (innerParsed === null && this.error) return null;
                        resultHtml += `<div style="background:#fff; border:2px solid #aaa; border-radius:8px; padding:14px; margin:12px 0;">${innerParsed.html}</div>`;
                        break;
                    }
                    case 'tooltip':
                        resultHtml += `<span title="${escapeHtml(innerRaw)}" style="border-bottom:1px dotted #888; cursor:help;">${escapeHtml(innerRaw.substring(0,20))}</span>`;
                        break;
                    case 'spacer':
                        let h = parseInt(innerRaw) || 16;
                        resultHtml += `<div style="height:${h}px;"></div>`;
                        break;
                    case 'flex': {
                        const innerParsed = this.parseInnerContent(innerRaw);
                        if (innerParsed === null && this.error) return null;
                        resultHtml += `<div style="display:flex; flex-wrap:wrap; gap:12px; margin:8px 0;">${innerParsed.html}</div>`;
                        break;
                    }
                    case 'select': {
                        const options = innerRaw.split(',');
                        let optsHtml = '';
                        for (let opt of options) {
                            optsHtml += `<option>${escapeHtml(opt.trim())}</option>`;
                        }
                        resultHtml += `<select style="padding:5px; margin:5px 0; width:100%;">${optsHtml}</select>`;
                        break;
                    }
                    case 'checkbox':
                        resultHtml += `<label style="display:block; margin:4px 0;"><input type="checkbox"> ${escapeHtml(innerRaw)}</label>`;
                        break;
                    case 'radio':
                        resultHtml += `<label style="display:inline-block; margin:4px 8px 4px 0;"><input type="radio" name="crs_radio"> ${escapeHtml(innerRaw)}</label>`;
                        break;
                    case 'range':
                        resultHtml += `<input type="range" min="0" max="100" value="${escapeHtml(innerRaw) || 50}" style="width:100%;">`;
                        break;
                    case 'textarea':
                        resultHtml += `<textarea rows="3" style="width:100%; padding:6px; margin:4px 0;" placeholder="${escapeHtml(innerRaw)}"></textarea>`;
                        break;
                    case 'hr':
                        resultHtml += `<hr style="margin:12px 0;">`;
                        break;
                    case 'center': {
                        const innerParsed = this.parseInnerContent(innerRaw);
                        if (innerParsed === null && this.error) return null;
                        resultHtml += `<div style="text-align:center;">${innerParsed.html}</div>`;
                        break;
                    }
                    case 'mark':
                        resultHtml += `<mark style="background:#ffecb3; padding:2px;">${escapeHtml(innerRaw)}</mark>`;
                        break;
                    case 'code':
                        resultHtml += `<code style="background:#f0f0f0; padding:2px 5px; border-radius:4px;">${escapeHtml(innerRaw)}</code>`;
                        break;
                    case 'details': {
                        const innerParsed = this.parseInnerContent(innerRaw);
                        if (innerParsed === null && this.error) return null;
                        resultHtml += `<details style="margin:8px 0;"><summary>подробнее</summary><div style="margin-top:6px;">${innerParsed.html}</div></details>`;
                        break;
                    }
                    case 'summary':
                        resultHtml += `<summary style="cursor:pointer; font-weight:bold;">${escapeHtml(innerRaw)}</summary>`;
                        break;
                    default:
                        this.setError(`Неизвестная команда: c.${tagName}`, tagStart);
                        return null;
                }
                i = nextIdx;
            }
            
            let styleBlock = collectedStyles.length ? `<style>${collectedStyles.join('\n')}</style>` : "";
            let scriptBlock = collectedScripts.length ? `<script>${collectedScripts.join('\n')}<\/script>` : "";
            return { html: styleBlock + resultHtml + scriptBlock };
        }
    }
    
    function executeCRS(code) {
        hideError();
        const parser = new CRSParser(code);
        const rendered = parser.parseAndRender();
        if (parser.error) {
            showError(parser.error, parser.errorLine);
            return false;
        }
        if (rendered && rendered.html !== undefined) {
            renderDiv.innerHTML = rendered.html;
            const btns = renderDiv.querySelectorAll('button');
            btns.forEach(btn => {
                if (!btn.hasAttribute('data-crs-evt')) {
                    btn.setAttribute('data-crs-evt', '1');
                    btn.addEventListener('click', () => alert(btn.innerText.trim()));
                }
            });
            return true;
        } else {
            showError("Ошибка трансляции", 1);
            return false;
        }
    }
    
    function loadExample() {
        editor.value = `<CURSED-CODING>
<c.title> CRS язык программирования <cc.title>
<c.text> Примеры использования команд: <cc.text>

<c.box>
  <c.button> Нажми меня <cc.button>
  <c.button> Ещё кнопка <cc.button>
  <c.badge> Новинка <cc.badge>
<cc.box>

<c.grid>
  <c.card>
    <c.text> Первая карточка <cc.text>
    <c.button> Кнопка <cc.button>
  <cc.card>
  <c.card>
    <c.text> Вторая карточка со ссылкой: <cc.text>
    <c.link> https://ya.ru | Яндекс <cc.link>
  <cc.card>
  <c.card>
    <c.text> Третья карточка <cc.text>
  <cc.card>
<cc.grid>

<c.input> Введите текст <cc.input>
<c.select> Опция 1, Опция 2, Опция 3 <cc.select>
<c.checkbox> Согласен с условиями <cc.checkbox>
<c.range> 50 <cc.range>
<c.textarea> Введите описание <cc.textarea>

<c.details>
  <c.summary> Подробнее о синтаксисе <cc.summary>
  <c.text> Команды пишутся так: <cc.text>
  <c.code> &lt;c.button&gt;текст&lt;cc.button&gt; <cc.code>
  <c.code> &lt;c.text&gt;текст&lt;cc.text&gt; <cc.code>
  <c.code> &lt;c.link&gt;url | текст&lt;cc.link&gt; <cc.code>
<cc.details>

<c.alert> Это важное уведомление <cc.alert>
<c.progress> 75 <cc.progress>

<c.flex>
  <c.badge> Быстро <cc.badge>
  <c.badge> Просто <cc.badge>
  <c.badge> Удобно <cc.badge>
<cc.flex>

<c.hr />
<c.center>
  <c.text> CRS Language Explorer <cc.text>
<cc.center>

<c.style>
  button { background: #d4e0ff; border-radius: 20px; padding: 6px 16px; margin: 4px; border: none; cursor: pointer; }
  button:hover { background: #c0d0ec; }
<cc.style>

<c.script>
  console.log("CRS загружен");
<cc.script>
</CCURSED-CODING>`;
        updateLineNumbers();
        hideError();
        renderDiv.innerHTML = `<div style="padding:20px; color:#666;">Пример загружен. Нажмите "ЗАПУСТИТЬ".</div>`;
    }
    
    document.getElementById('runBtn').addEventListener('click', () => {
        const src = editor.value;
        if (!src.trim()) showError("Пустой код", 1);
        else executeCRS(src);
    });
    
    document.getElementById('resetExample').addEventListener('click', () => loadExample());
    document.getElementById('clearOutput').addEventListener('click', () => {
        renderDiv.innerHTML = `<div style="padding:20px; color:#aaa;">Вывод очищен</div>`;
        hideError();
    });
    
    loadExample();
    syncScroll();
    updateLineNumbers();
</script>
</body>
</html>
