<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КРС Language Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e8ecf2; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border: 1px solid #aaa; border-radius: 8px; overflow: hidden; }
        .header { background: #d9dfe8; padding: 10px 16px; border-bottom: 1px solid #999; font-weight: bold; font-size: 1.3rem; display: flex; justify-content: space-between; }
        .workspace { display: flex; flex-wrap: wrap; }
        .editor-panel { flex: 1.2; min-width: 450px; border-right: 1px solid #ccc; }
        .editor-header { background: #eef2f7; padding: 6px 12px; border-bottom: 1px solid #bbb; font-weight: bold; display: flex; justify-content: space-between; }
        .editor-with-lines { display: flex; background: #fefef7; }
        .line-numbers { background: #f0f2f5; padding: 12px 8px; text-align: right; font-family: monospace; font-size: 13px; line-height: 1.5; color: #888; border-right: 1px solid #ddd; min-width: 45px; }
        .line-numbers div { white-space: pre; }
        textarea { width: 100%; font-family: monospace; font-size: 13px; padding: 12px; border: none; background: #fefef7; resize: vertical; min-height: 450px; outline: none; }
        .button-bar { padding: 10px; background: #eef2f7; border-top: 1px solid #ccc; display: flex; gap: 10px; flex-wrap: wrap; }
        button { background: #e0e5ec; border: 1px solid #8a9cb0; padding: 6px 16px; font-family: monospace; font-weight: bold; cursor: pointer; }
        button:hover { background: #d0d8e4; }
        .output-panel { flex: 1; min-width: 350px; background: #fff; display: flex; flex-direction: column; }
        .output-header { background: #eef2f7; padding: 6px 12px; border-bottom: 1px solid #bbb; font-weight: bold; }
        .render-area { padding: 16px; background: white; min-height: 500px; overflow-y: auto; }
        .error-box { background: #fff0ee; border-left: 5px solid #c00; padding: 10px; color: #a00; display: none; margin: 10px; }
        .user-panel { background: #eef2f7; padding: 5px 12px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        .crs-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .crs-modal-content { background: white; border-radius: 12px; padding: 24px; min-width: 300px; text-align: center; }
        .crs-modal-content button { background: #4CAF50; color: white; border: none; padding: 8px 24px; border-radius: 6px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; max-width: 400px; width: 90%; }
        .app-item { background: #f0f2f5; padding: 10px; margin: 10px 0; border-radius: 4px; cursor: pointer; }
        .app-item:hover { background: #e0e5ec; }
        .crs-card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin: 10px 0; background: #fafcff; }
        .crs-btn { background: #4CAF50; color: white; border: none; padding: 8px 16px; margin: 5px; border-radius: 4px; cursor: pointer; }
        .crs-input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin: 5px 0; width: 100%; }
        .crs-text { margin: 5px 0; }
        .crs-title { margin: 10px 0; }
        .crs-select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin: 5px 0; }
        .crs-radio-group { margin: 5px 0; }
        .crs-range { width: 100%; margin: 5px 0; }
        .crs-image { max-width: 100%; height: auto; margin: 5px 0; }
        .crs-video { max-width: 100%; margin: 5px 0; }
        .crs-audio { width: 100%; margin: 5px 0; }
        .crs-table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        .crs-table th, .crs-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .crs-details { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 8px; }
        .crs-summary { font-weight: bold; cursor: pointer; }
        .crs-code { background: #1e2a2f; color: #d4d4d4; padding: 10px; border-radius: 8px; font-family: monospace; overflow-x: auto; }
        .crs-textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin: 5px 0; width: 100%; resize: vertical; }
        .crs-link { color: #2196F3; text-decoration: underline; cursor: pointer; }
        .crs-checkbox { display: block; margin: 5px 0; }
        .crs-badge { background: #ff9800; color: #1a2a3a; padding: 2px 8px; border-radius: 12px; font-size: 12px; display: inline-block; }
        .crs-mark { background: #ffeb3b; padding: 2px 4px; }
        .crs-alert { background: #fff3e0; border-left: 4px solid #ff9800; padding: 12px; margin: 10px 0; border-radius: 8px; }
        .crs-progress { width: 100%; margin: 5px 0; }
        .crs-tooltip { border-bottom: 1px dotted #666; cursor: help; }
        .crs-spacer { width: 100%; }
    </style>
</head>
<body>

</div>

<script>
    const SUPABASE_URL = 'https://tmjqafqecjpizawdruzq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanFhZnFlY2pwaXphd2RydXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTk2OTYsImV4cCI6MjA5NTQ3NTY5Nn0.8K7i5QEbjYWSvqw78P8RSR_abYM8uCRZbvC9Hp12bac';
    
    let currentUser = null;
    let currentAppId = null;
    let tgTokenCache = localStorage.getItem('crs_tg_token') || '';
    let tgChatIdCache = localStorage.getItem('crs_tg_chat_id') || '';

    window.setupTelegram = function() {

    window.sendToTelegram = async function(message) {

        try {

    window.alert = function(msg) {
        const old = document.querySelector('.crs-modal');
        if(old) old.remove();
        const div = document.createElement('div');
        div.className = 'crs-modal';
        div.innerHTML = `<div class="crs-modal-content"><p>${String(msg)}</p><button onclick="this.closest('.crs-modal').remove()">OK</button></div>`;
        document.body.appendChild(div);
    };
    
    async function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!username || !password) { alert("Заполните поля"); return; }
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/crs_users`, {
                method: 'POST', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },

            });

    async function login() {

    function logout() {
        currentUser = null; localStorage.removeItem('crs_user');
        document.getElementById('currentUser').innerText = "Гость";
        document.getElementById('showLoginBtn').style.display = 'inline-block';
        document.getElementById('showRegisterBtn').style.display = 'inline-block';
        document.getElementById('logoutBtn').style.display = 'none';
        alert("Вы вышли");
    }
    
    async function saveApp() {
        if (!currentUser) { alert("Сначала войдите"); return; }
        const title = prompt("Название приложения:");
        if (!title) return;
        const code = document.getElementById('crsCode').value;
        if (!code) { alert("Код пуст"); return; }
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/crs_apps`, {
                method: 'POST', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, code, author_id: currentUser.id, is_public: true })
            });
            const newApp = await res.json();
            if (newApp && newApp.length > 0) {
                currentAppId = newApp[0].id;
                if (tgTokenCache && tgChatIdCache) {
                    await fetch(`${SUPABASE_URL}/rest/v1/crs_tg_bots`, {
                        method: 'POST', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ app_id: currentAppId, author_id: currentUser.id, bot_token: tgTokenCache, chat_id: tgChatIdCache })
                    });
                }
            }
            alert("Сохранено!");
        } catch(e) { alert("Ошибка сохранения"); }
    }
    
    async function getMyApps() {
        if (!currentUser) return [];
        const res = await fetch(`${SUPABASE_URL}/rest/v1/crs_apps?author_id=eq.${currentUser.id}&select=*`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        return await res.json();
    }
    
    async function getAllApps() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/crs_apps?select=*&order=created_at.desc`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        return await res.json();
    }
    
    function parseTagAttributes(tagContent) {
        const attrs = {};
        const idMatch = tagContent.match(/id=["']([^"']+)["']/);
        const classMatch = tagContent.match(/class=["']([^"']+)["']/);
        if (idMatch) attrs.id = idMatch[1];
        if (classMatch) attrs.class = classMatch[1];
        return attrs;
    }
    
    function executeCRS(code) {
        const openTag = "<CURSED-CODING>";
        const closeTag = "</CCURSED-CODING>";
        const openIdx = code.indexOf(openTag);
        const closeIdx = code.indexOf(closeTag);
        
        if (openIdx === -1 || closeIdx === -1) {
            document.getElementById('renderContainer').innerHTML = '<div style="color:#b00;">Ошибка: нет тегов</div>';
            return;
        }
        
        let content = code.substring(openIdx + openTag.length, closeIdx);
        let html = '';
        let scripts = [];
        let styles = [];
        let i = 0;
        
        while (i < content.length) {
            const openMatch = content.substring(i).match(/<c\.([a-zA-Zа-яА-Я_]+)([^>]*)>/);
            if (!openMatch) break;
            
            const tag = openMatch[1].toLowerCase();
            const attrsRaw = openMatch[2] || '';
            const attrs = parseTagAttributes(attrsRaw);
            const contentStart = i + openMatch.index + openMatch[0].length;
            const closeTagPattern = `<cc.${tag}>`;
            let closePos = content.indexOf(closeTagPattern, contentStart);
            
            if (closePos === -1) break;
            
            let innerRaw = content.substring(contentStart, closePos);
            i = closePos + closeTagPattern.length;
            
            let idAttr = attrs.id ? ` id="${attrs.id}"` : '';
            let classAttr = attrs.class ? ` class="${attrs.class}"` : '';
            
            if (tag === 'button') {
                html += `<button${idAttr} class="crs-btn ${attrs.class || ''}">${escapeHtml(innerRaw.trim()) || 'Кнопка'}</button>`;
            }
            else if (tag === 'input') {
                html += `<input type="text"${idAttr} class="crs-input ${attrs.class || ''}" placeholder="${escapeHtml(innerRaw.trim())}">`;
            }
            else if (tag === 'textarea') {
                html += `<textarea${idAttr} class="crs-textarea ${attrs.class || ''}" rows="4" placeholder="${escapeHtml(innerRaw.trim())}"></textarea>`;
            }
            else if (tag === 'text') {
                html += `<div${idAttr} class="crs-text ${attrs.class || ''}">${escapeHtml(innerRaw)}</div>`;
            }
            else if (tag === 'title') {
                html += `<h2${idAttr} class="crs-title ${attrs.class || ''}">${escapeHtml(innerRaw)}</h2>`;
            }
            else if (tag === 'card') {
                html += `<div${idAttr} class="crs-card ${attrs.class || ''}">${escapeHtml(innerRaw)}</div>`;
            }
            else if (tag === 'link') {
                let parts = innerRaw.split('|');
                let url = parts[0] ? parts[0].trim() : '#';
                let text = parts[1] ? parts[1].trim() : 'Ссылка';
                html += `<a${idAttr} class="crs-link ${attrs.class || ''}" href="${escapeHtml(url)}" target="_blank">${escapeHtml(text)}</a>`;
            }
            else if (tag === 'image') {
                let parts = innerRaw.split('|');
                let src = parts[0] ? parts[0].trim() : '';
                let alt = parts[1] ? parts[1].trim() : 'Изображение';
                html += `<img${idAttr} class="crs-image ${attrs.class || ''}" src="${escapeHtml(src)}" alt="${escapeHtml(alt)}">`;
            }
            else if (tag === 'video') {
                let parts = innerRaw.split('|');
                let src = parts[0] ? parts[0].trim() : '';
                html += `<video${idAttr} class="crs-video ${attrs.class || ''}" src="${escapeHtml(src)}" controls></video>`;
            }
            else if (tag === 'audio') {
                let parts = innerRaw.split('|');
                let src = parts[0] ? parts[0].trim() : '';
                html += `<audio${idAttr} class="crs-audio ${attrs.class || ''}" src="${escapeHtml(src)}" controls></audio>`;
            }
            else if (tag === 'select') {
                let options = innerRaw.split(',').map(opt => opt.trim());
                let selectHtml = `<select${idAttr} class="crs-select ${attrs.class || ''}">`;
                for (let opt of options) selectHtml += `<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`;
                selectHtml += `</select>`;
                html += selectHtml;
            }
            else if (tag === 'radio') {
                let options = innerRaw.split(',').map(opt => opt.trim());
                let radioHtml = `<div${idAttr} class="crs-radio-group ${attrs.class || ''}">`;
                for (let opt of options) radioHtml += `<label><input type="radio" name="crs_radio_${attrs.id || 'group'}" value="${escapeHtml(opt)}"> ${escapeHtml(opt)}</label>`;
                radioHtml += `</div>`;
                html += radioHtml;
            }
            else if (tag === 'checkbox') {
                html += `<label${idAttr} class="crs-checkbox ${attrs.class || ''}"><input type="checkbox"> ${escapeHtml(innerRaw.trim())}</label>`;
            }
            else if (tag === 'range') {
                html += `<input type="range" min="0" max="100" value="${innerRaw.trim() || '50'}"${idAttr} class="crs-range ${attrs.class || ''}">`;
            }
            else if (tag === 'number') {
                html += `<input type="number"${idAttr} class="crs-number ${attrs.class || ''}" placeholder="${escapeHtml(innerRaw.trim())}">`;
            }
            else if (tag === 'date') {
                html += `<input type="date"${idAttr} class="crs-date ${attrs.class || ''}">`;
            }
            else if (tag === 'color') {
                html += `<input type="color"${idAttr} class="crs-color ${attrs.class || ''}" value="#2196F3">`;
            }
            else if (tag === 'list') {
                html += `<ul${idAttr} class="crs-list ${attrs.class || ''}">${innerRaw}</ul>`;
            }
            else if (tag === 'item') {
                html += `<li class="crs-item">${escapeHtml(innerRaw)}</li>`;
            }
            else if (tag === 'olist') {
                html += `<ol${idAttr} class="crs-olist ${attrs.class || ''}">${innerRaw}</ol>`;
            }
            else if (tag === 'table') {
                html += `<table${idAttr} class="crs-table ${attrs.class || ''}">${innerRaw}</table>`;
            }
            else if (tag === 'row') {
                html += `<tr>${innerRaw}</tr>`;
            }
            else if (tag === 'header') {
                html += `<th class="crs-th">${escapeHtml(innerRaw)}</th>`;
            }
            else if (tag === 'cell') {
                html += `<td class="crs-td">${escapeHtml(innerRaw)}</td>`;
            }
            else if (tag === 'details') {
                html += `<details${idAttr} class="crs-details ${attrs.class || ''}">${innerRaw}</details>`;
            }
            else if (tag === 'summary') {
                html += `<summary class="crs-summary">${escapeHtml(innerRaw)}</summary>`;
            }
            else if (tag === 'grid') {
                html += `<div${idAttr} style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;">${innerRaw}</div>`;
            }
            else if (tag === 'flex') {
                html += `<div${idAttr} style="display:flex;gap:16px;flex-wrap:wrap;">${innerRaw}</div>`;
            }
            else if (tag === 'center') {
                html += `<div${idAttr} style="text-align:center;">${innerRaw}</div>`;
            }
            else if (tag === 'box') {
                html += `<div${idAttr} style="border:1px solid #ddd;border-radius:8px;padding:16px;margin:10px 0;">${innerRaw}</div>`;
            }
            else if (tag === 'badge') {
                html += `<span${idAttr} class="crs-badge">${escapeHtml(innerRaw)}</span>`;
            }
            else if (tag === 'mark') {
                html += `<mark${idAttr} class="crs-mark">${escapeHtml(innerRaw)}</mark>`;
            }
            else if (tag === 'code') {
                html += `<pre${idAttr} class="crs-code"><code>${escapeHtml(innerRaw)}</code></pre>`;
            }
            else if (tag === 'alert') {
                html += `<div${idAttr} class="crs-alert">${escapeHtml(innerRaw)}</div>`;
            }
            else if (tag === 'progress') {
                html += `<progress${idAttr} class="crs-progress" value="${innerRaw.trim() || '50'}" max="100"></progress>`;
            }
            else if (tag === 'tooltip') {
                html += `<span${idAttr} class="crs-tooltip" title="${escapeHtml(innerRaw)}">${escapeHtml(innerRaw)}</span>`;
            }
            else if (tag === 'hr') {
                html += `<hr${idAttr} class="crs-hr">`;
            }
            else if (tag === 'spacer') {
                html += `<div${idAttr} style="height:${innerRaw.trim() || '20'}px;"></div>`;
            }
            else if (tag === 'style') {
                styles.push(innerRaw);
            }
            else if (tag === 'script') {
                scripts.push(innerRaw);
            }
            else if (tag === 'html') {
                html += innerRaw;
            }
        }
        
        let styleText = '';
        for (let st of styles) styleText += st;
        if (styleText) html = `<style>${styleText}</style>` + html;
        
        const renderDiv = document.getElementById('renderContainer');
        renderDiv.innerHTML = html;
        
        setTimeout(() => {
            for (let sc of scripts) {
                try {
                    let convertedScript = convertKRSJS(sc);
                    const script = document.createElement('script');
                    script.textContent = convertedScript;
                    renderDiv.appendChild(script);
                } catch(e) { console.log(e); }
            }
        }, 10);
    }
    
    function convertKRSJS(krsjs) {
        let js = '';
        let lines = krsjs.split('\n');
        let currentSelector = '';
        let currentAction = '';
        let actionContent = '';
        
        for (let line of lines) {
            let trimmed = line.trim();
            if (trimmed === '') continue;
            
            if (trimmed.endsWith('{') && !trimmed.includes('при')) {
                currentSelector = trimmed.substring(0, trimmed.length - 1).trim();
                currentAction = '';
                actionContent = '';
                continue;
            }
            
            if (trimmed === '}') {
                if (currentSelector && currentAction) {
                    js += generateJSCode(currentSelector, currentAction, actionContent);
                }
                currentSelector = '';
                currentAction = '';
                actionContent = '';
                continue;
            }
            
            if (trimmed.startsWith('при нажатии')) {
                currentAction = 'click';
                actionContent = trimmed.replace('при нажатии', '').trim();
            }
            else if (trimmed.startsWith('при вводе')) {
                currentAction = 'input';
                actionContent = trimmed.replace('при вводе', '').trim();
            }
            else if (trimmed.startsWith('при наведении')) {
                currentAction = 'mouseenter';
                actionContent = trimmed.replace('при наведении', '').trim();
            }
        }
        
        if (currentSelector && currentAction) {
            js += generateJSCode(currentSelector, currentAction, actionContent);
        }
        
        return js;
    }
    
    function generateJSCode(selector, action, actionCode) {
        if (!selector || !action) return '';
        
        let cssSelector = selector === 'кнопка' ? '.crs-btn' : 
                         selector === 'поле' ? '.crs-input' : 
                         selector === 'карточка' ? '.crs-card' : 
                         selector === 'текст' ? '.crs-text' : 
                         selector === 'заголовок' ? '.crs-title' : selector;
        
        let eventName = action === 'click' ? 'click' : action === 'input' ? 'input' : action === 'mouseenter' ? 'mouseenter' : '';
        if (!eventName) return '';
        
        let jsCode = actionCode;
        jsCode = jsCode.replace(/отправить_тг\(["'`](.+?)["'`]\)/, 'sendToTelegram("$1")');
        jsCode = jsCode.replace(/показать\(/g, 'alert(');
        jsCode = jsCode.replace(/значение/g, 'this.value');
        jsCode = jsCode.replace(/имя/g, 'document.getElementById("name") ? document.getElementById("name").value : ""');
        jsCode = jsCode.replace(/текст/g, 'this.innerText');
        
        return `
        (function() {
            var elements = document.querySelectorAll('${cssSelector}');
            for (var i = 0; i < elements.length; i++) {
                elements[i].addEventListener('${eventName}', function(event) {
                    ${jsCode}
                });
            }
        })();
        `;
    }
    
    async function loadApp(app) {
        document.getElementById('crsCode').value = app.code;
        currentAppId = app.id;
        updateLineNumbers();
        executeCRS(app.code);
    }
    
    async function showMyApps() {
        const apps = await getMyApps();
        const modal = document.getElementById('appsModal');
        const list = document.getElementById('modalList');
        document.getElementById('modalTitle').innerText = "Мои приложения";
        list.innerHTML = '';
        for (let app of apps) {
            let div = document.createElement('div');
            div.className = 'app-item';
            div.innerHTML = `<strong>${escapeHtml(app.title)}</strong><br><small>${new Date(app.created_at).toLocaleString()}</small>`;
            div.onclick = () => { loadApp(app); modal.style.display = 'none'; };
            list.appendChild(div);
        }
        modal.style.display = 'flex';
    }
    
    async function showAllApps() {
        const apps = await getAllApps();
        const modal = document.getElementById('appsModal');
        const list = document.getElementById('modalList');
        document.getElementById('modalTitle').innerText = "Все приложения";
        list.innerHTML = '';
        for (let app of apps) {
            let div = document.createElement('div');
            div.className = 'app-item';
            div.innerHTML = `<strong>${escapeHtml(app.title)}</strong><br><small>${new Date(app.created_at).toLocaleString()}</small>`;
            div.onclick = () => { loadApp(app); modal.style.display = 'none'; };
            list.appendChild(div);
        }
        modal.style.display = 'flex';
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    const editor = document.getElementById('crsCode');
    const lineNumbersDiv = document.getElementById('lineNumbers');
    const lineCountInfo = document.getElementById('lineCountInfo');
    
    function updateLineNumbers() {
        const lines = editor.value.split(/\r?\n/);
        lineCountInfo.textContent = `строк: ${lines.length}`;
        let html = '';
        for (let i = 1; i <= lines.length; i++) html += `<div>${i}</div>`;
        lineNumbersDiv.innerHTML = html;
    }
    
    editor.addEventListener('scroll', function() { lineNumbersDiv.scrollTop = editor.scrollTop; });
    
    document.getElementById('runBtn').onclick = () => { updateLineNumbers(); executeCRS(editor.value); };
    document.getElementById('saveAppBtn').onclick = saveApp;
    document.getElementById('myAppsBtn').onclick = showMyApps;
    document.getElementById('allAppsBtn').onclick = showAllApps;
    document.getElementById('tgSetupBtn').onclick = setupTelegram;
    document.getElementById('resetExample').onclick = () => {
        editor.value = `<CURSED-CODING>
<c.title>Проверка Telegram<cc.title>
<c.input id="name" placeholder="Имя"><cc.input>
<c.button>Отправить<cc.button>
<c.script>
кнопка { при нажатии отправить_тг("Имя: " + имя) }
</c.script>
</CCURSED-CODING>`;
        updateLineNumbers();
        executeCRS(editor.value);
    };
    document.getElementById('clearOutput').onclick = () => { document.getElementById('renderContainer').innerHTML = '<div style="color:#aaa;text-align:center;padding:40px;">Результат</div>'; };
    
    document.getElementById('showLoginBtn').onclick = () => document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('showRegisterBtn').onclick = () => document.getElementById('registerModal').style.display = 'flex';
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('loginSubmitBtn').onclick = login;
    document.getElementById('closeLoginBtn').onclick = () => document.getElementById('loginModal').style.display = 'none';
    document.getElementById('registerSubmitBtn').onclick = register;
    document.getElementById('closeRegisterBtn').onclick = () => document.getElementById('registerModal').style.display = 'none';
    document.getElementById('closeAppsBtn').onclick = () => document.getElementById('appsModal').style.display = 'none';
    
    const saved = localStorage.getItem('crs_user');
    if (saved) {
        try { currentUser = JSON.parse(saved); 
            document.getElementById('currentUser').innerText = currentUser.username;
            document.getElementById('showLoginBtn').style.display = 'none';
            document.getElementById('showRegisterBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        } catch(e) {}
    }
    updateLineNumbers();
    executeCRS(editor.value);
</script>
