<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS Light - простой язык программирования</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e8ecf2; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border: 1px solid #aaa; border-radius: 12px; overflow: hidden; }
        .header { background: #4CAF50; color: white; padding: 15px 20px; font-size: 1.5rem; font-weight: bold; }
        .workspace { display: flex; flex-wrap: wrap; }
        .editor-panel { flex: 1.2; min-width: 450px; border-right: 1px solid #ccc; }
        .editor-header { background: #f5f5f5; padding: 10px; font-weight: bold; border-bottom: 1px solid #ccc; }
        textarea { width: 100%; height: 400px; font-family: 'Courier New', monospace; font-size: 14px; padding: 15px; border: none; resize: vertical; outline: none; }
        .button-bar { padding: 10px; background: #f5f5f5; border-top: 1px solid #ccc; display: flex; gap: 10px; flex-wrap: wrap; }
        button { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        .output-panel { flex: 1; min-width: 350px; background: #fff; display: flex; flex-direction: column; }
        .output-header { background: #f5f5f5; padding: 10px; font-weight: bold; border-bottom: 1px solid #ccc; }
        .render-area { padding: 20px; background: white; min-height: 500px; overflow-y: auto; }
        .error-box { background: #ffebee; border-left: 4px solid #f44336; padding: 10px; margin: 10px; display: none; }
        .user-panel { background: #f5f5f5; padding: 8px 15px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        
        /* Стили для кастомного alert */
        .crs-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .crs-modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            min-width: 300px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: slideIn 0.2s ease;
        }
        .crs-modal-content p {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }
        .crs-modal-content button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .crs-modal-content button:hover { background: #45a049; }
        @keyframes slideIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">✨ CRS Light — простой язык для всех ✨</div>
    <div class="user-panel">
        <span>📝 Пиши как говоришь!</span>
        <span style="font-size:12px;">💡 Пример: "когда нажата кнопка → показать Привет!"</span>
    </div>
    <div class="workspace">
        <div class="editor-panel">
            <div class="editor-header">📝 РЕДАКТОР CRS (пиши простыми словами)</div>
            <textarea id="crsCode"></textarea>
            <div class="button-bar">
                <button id="runBtn">▶ ЗАПУСТИТЬ</button>
                <button id="resetExample">📋 ПРИМЕР</button>
                <button id="clearOutput">🗑 ОЧИСТИТЬ</button>
            </div>
        </div>
        <div class="output-panel">
            <div class="output-header">🎨 РЕЗУЛЬТАТ</div>
            <div id="errorPanel" class="error-box"></div>
            <div id="renderContainer" class="render-area"></div>
        </div>
    </div>
</div>

<script>
    // КАСТОМНЫЙ ALERT (свой)
    function crsAlert(message) {
        const old = document.querySelector('.crs-modal');
        if(old) old.remove();
        const div = document.createElement('div');
        div.className = 'crs-modal';
        div.innerHTML = `
            <div class="crs-modal-content">
                <p>${String(message).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}</p>
                <button onclick="this.closest('.crs-modal').remove()">OK</button>
            </div>
        `;
        document.body.appendChild(div);
    }
    
    // Переопределяем alert
    window.alert = crsAlert;
    
    const editor = document.getElementById('crsCode');
    const renderDiv = document.getElementById('renderContainer');
    const errorPanel = document.getElementById('errorPanel');
    
    function showError(msg) {
        errorPanel.style.display = 'block';
        errorPanel.innerHTML = `❌ ${msg}`;
        setTimeout(() => errorPanel.style.display = 'none', 5000);
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    // ПЕРЕВОД CRS-ПРОСТОГО В НАСТОЯЩИЙ CSS
    function parseSimpleCSS(cssCode) {
        let realCSS = '';
        const lines = cssCode.split('\n');
        
        const colorMap = {
            'красный': 'red', 'зелёный': 'green', 'синий': 'blue', 'жёлтый': 'yellow',
            'чёрный': 'black', 'белый': 'white', 'серый': 'gray', 'оранжевый': 'orange',
            'розовый': 'pink', 'фиолетовый': 'purple', 'голубой': 'cyan'
        };
        
        for (let line of lines) {
            line = line.trim().toLowerCase();
            if (line.startsWith('кнопка')) {
                let selector = '.crs-btn';
                if (line.includes('при наведении')) selector = '.crs-btn:hover';
                else if (line.includes('при нажатии')) selector = '.crs-btn:active';
                realCSS += `${selector} { `;
                continue;
            }
            else if (line.startsWith('поле')) {
                realCSS += `.crs-input { `;
                continue;
            }
            else if (line.startsWith('страница') || line.startsWith('тело')) {
                realCSS += `body { `;
                continue;
            }
            else if (line.startsWith('карточка')) {
                realCSS += `.card { `;
                continue;
            }
            else if (line === '}') {
                realCSS += `}`;
                continue;
            }
            else if (line.includes('=')) {
                let [prop, val] = line.split('=');
                prop = prop.trim();
                val = val.trim();
                
                // Перевод свойств
                if (prop === 'фон') prop = 'background-color';
                else if (prop === 'цвет') prop = 'color';
                else if (prop === 'отступ') prop = 'padding';
                else if (prop === 'отступ снаружи') prop = 'margin';
                else if (prop === 'углы') prop = 'border-radius';
                else if (prop === 'размер шрифта') prop = 'font-size';
                else if (prop === 'шрифт') prop = 'font-family';
                else if (prop === 'ширина') prop = 'width';
                else if (prop === 'высота') prop = 'height';
                else if (prop === 'выравнивание') prop = 'text-align';
                else if (prop === 'рамка') prop = 'border';
                else if (prop === 'тень') prop = 'box-shadow';
                else if (prop === 'показ') prop = 'display';
                else if (prop === 'нет') val = 'none';
                
                if (colorMap[val]) val = colorMap[val];
                if (val === 'нет') val = 'none';
                if (val === 'сплошной') val = 'solid';
                
                realCSS += `${prop}: ${val}; `;
            }
            else if (line === '}') {
                realCSS += `} `;
            }
        }
        return realCSS;
    }
    
    // ПЕРЕВОД CRS-ПРОСТОГО JS В НАСТОЯЩИЙ
    function parseSimpleJS(jsCode, containerId) {
        let realJS = '';
        let lines = jsCode.split('\n');
        
        for (let line of lines) {
            line = line.trim();
            
            if (line.startsWith('когда нажата кнопка')) {
                realJS += `document.querySelector('.crs-btn').onclick = function() { `;
            }
            else if (line.startsWith('когда изменён инпут')) {
                realJS += `document.querySelector('.crs-input').oninput = function() { `;
            }
            else if (line.startsWith('показать')) {
                let msg = line.replace('показать', '').trim();
                realJS += `alert(${JSON.stringify(msg)}); `;
            }
            else if (line.startsWith('записать')) {
                let msg = line.replace('записать', '').trim();
                realJS += `console.log(${JSON.stringify(msg)}); `;
            }
            else if (line.startsWith('если')) {
                let condition = line.match(/если (.+?) то/);
                if (condition) {
                    let cond = condition[1].trim();
                    cond = cond.replace('равно', '===').replace('не равно', '!==');
                    realJS += `if (${cond}) { `;
                }
            }
            else if (line === 'иначе') {
                realJS += `} else { `;
            }
            else if (line === 'то') {
                // ничего, уже обработано
            }
            else if (line === '}') {
                realJS += `} `;
            }
            else if (line.includes('=') && !line.includes('if')) {
                let [varName, val] = line.split('=');
                varName = varName.trim();
                val = val.trim();
                if (val === 'значение инпута') val = `document.querySelector('.crs-input').value`;
                realJS += `let ${varName} = ${val}; `;
            }
            else if (line === 'конец') {
                realJS += `} `;
            }
        }
        return realJS;
    }
    
    // ГЛАВНЫЙ ПАРСЕР CRS
    function executeCRS(code) {
        errorPanel.style.display = 'none';
        
        const openTag = "<CURSED-CODING>";
        const closeTag = "</CCURSED-CODING>";
        const openIdx = code.indexOf(openTag);
        const closeIdx = code.indexOf(closeTag);
        
        if (openIdx === -1 || closeIdx === -1) {
            renderDiv.innerHTML = '<div style="color:#c00;">❌ Ошибка: нужны теги &lt;CURSED-CODING&gt; ... &lt;/CCURSED-CODING&gt;</div>';
            return;
        }
        
        let content = code.substring(openIdx + openTag.length, closeIdx);
        let resultHtml = "";
        let styles = [];
        let scripts = [];
        let i = 0;
        
        while (i < content.length) {
            const openMatch = content.substring(i).match(/<c\.([a-zA-Z]+)>/);
            if (!openMatch) break;
            
            const tag = openMatch[1].toLowerCase();
            const contentStart = i + openMatch.index + openMatch[0].length;
            const closeTagPattern = `<cc.${tag}>`;
            const closePos = content.indexOf(closeTagPattern, contentStart);
            if (closePos === -1) break;
            
            const innerRaw = content.substring(contentStart, closePos);
            i = closePos + closeTagPattern.length;
            
            if (tag === 'button') {
                resultHtml += `<button class="crs-btn" style="background:#4CAF50; color:white; border:none; padding:10px 20px; margin:5px; border-radius:8px; cursor:pointer;">${escapeHtml(innerRaw.trim()) || 'Кнопка'}</button>`;
            }
            else if (tag === 'input') {
                resultHtml += `<input type="text" class="crs-input" placeholder="${escapeHtml(innerRaw.trim())}" style="padding:10px; border:1px solid #ccc; border-radius:8px; margin:5px 0; width:100%;">`;
            }
            else if (tag === 'text') {
                resultHtml += `<div style="margin:10px 0;">${escapeHtml(innerRaw)}</div>`;
            }
            else if (tag === 'title') {
                resultHtml += `<h2 style="margin:15px 0 10px;">${escapeHtml(innerRaw)}</h2>`;
            }
            else if (tag === 'style') {
                styles.push(innerRaw);
            }
            else if (tag === 'script') {
                scripts.push(innerRaw);
            }
            else {
                resultHtml += `<div>${escapeHtml(innerRaw)}</div>`;
            }
        }
        
        // Обрабатываем CSS
        let finalCSS = '';
        for (let style of styles) {
            finalCSS += parseSimpleCSS(style);
        }
        if (finalCSS) {
            resultHtml = `<style>${finalCSS}</style>${resultHtml}`;
        }
        
        renderDiv.innerHTML = resultHtml;
        
        // Обрабатываем JS
        setTimeout(() => {
            for (let script of scripts) {
                const realJS = parseSimpleJS(script);
                if (realJS) {
                    const scriptEl = document.createElement('script');
                    scriptEl.textContent = realJS;
                    renderDiv.appendChild(scriptEl);
                }
            }
        }, 50);
    }
    
    function loadExample() {
        editor.value = `<CURSED-CODING>

<c.title> Привет! Это CRS Light </c.title>

<c.text> Напиши своё имя: </c.text>
<c.input> </c.input>
<c.button> Сказать привет </c.button>

<c.style>
  кнопка
    фон = зелёный
    цвет = белый
    отступ = 12px 24px
    углы = 10px
    рамка = нет
  
  кнопка при наведении
    фон = тёмно-зелёный
  
  поле
    отступ = 10px
    ширина = 250px
    углы = 8px
    рамка = 1px сплошной серый
</c.style>

<c.script>
  когда нажата кнопка
    имя = значение инпута
    если имя равно 
      показать Введи своё имя!
    иначе
      показать Привет,  имя !
</c.script>

</CCURSED-CODING>`;
        executeCRS(editor.value);
    }
    
    document.getElementById('runBtn').onclick = () => executeCRS(editor.value);
    document.getElementById('resetExample').onclick = () => loadExample();
    document.getElementById('clearOutput').onclick = () => {
        renderDiv.innerHTML = '<div style="color:#aaa; text-align:center; padding:40px;">✨ Результат появится здесь ✨</div>';
        errorPanel.style.display = 'none';
    };
    
    loadExample();
</script>
</body>
</html>
