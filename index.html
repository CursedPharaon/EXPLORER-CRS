<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CRS Explorer</title>
    <style>
        body { background: #e8ecf2; font-family: monospace; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border: 1px solid #aaa; }
        .header { background: #d9dfe8; padding: 10px; border-bottom: 1px solid #aaa; font-weight: bold; }
        .workspace { display: flex; }
        .editor-panel { flex: 1; border-right: 1px solid #aaa; }
        textarea { width: 100%; height: 400px; font-family: monospace; padding: 10px; border: none; }
        .button-bar { padding: 10px; background: #eef2f7; border-top: 1px solid #aaa; }
        button { background: #e0e5ec; border: 1px solid #8a9cb0; padding: 6px 16px; cursor: pointer; }
        .output-panel { flex: 1; }
        .render-area { padding: 16px; min-height: 400px; }
        .error-box { background: #ffe6e5; padding: 10px; color: #b00; display: none; margin: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">CRS LANGUAGE EXPLORER | &lt;CURSED-CODING&gt; ... &lt;/CCURSED-CODING&gt;</div>
    <div class="workspace">
        <div class="editor-panel">
            <textarea id="code"></textarea>
            <div class="button-bar">
                <button id="run">ЗАПУСТИТЬ</button>
                <button id="example">ПРИМЕР</button>
            </div>
        </div>
        <div class="output-panel">
            <div id="error" class="error-box"></div>
            <div id="render" class="render-area"></div>
        </div>
    </div>
</div>

<script>
    const editor = document.getElementById('code');
    const renderDiv = document.getElementById('render');
    const errorDiv = document.getElementById('error');

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showError(msg, line) {
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = `Ошибка (строка ${line}): ${escapeHtml(msg)}`;
        renderDiv.innerHTML = `<div style="color:#b00;">Ошибка: ${escapeHtml(msg)} (строка ${line})</div>`;
    }

    function hideError() { errorDiv.style.display = 'none'; }

    function parseCRS(source) {
        const lines = source.split(/\r?\n/);
        const openTag = "<CURSED-CODING>";
        const closeTag = "</CCURSED-CODING>";
        
        let openIdx = source.indexOf(openTag);
        let closeIdx = source.indexOf(closeTag);
        
        if (openIdx === -1) return { error: "Нет <CURSED-CODING>", line: 1 };
        if (closeIdx === -1) return { error: "Нет </CCURSED-CODING>", line: lines.length };
        
        let inner = source.substring(openIdx + openTag.length, closeIdx);
        if (inner.trim() === "") return { error: "Код пуст", line: openIdx };
        
        return parseInner(inner, lines);
    }
    
    function parseInner(content, originalLines) {
        let result = "";
        let styles = [];
        let scripts = [];
        let i = 0;
        const len = content.length;
        
        function getLine(pos) {
            let line = 1, p = 0;
            for (let j = 0; j < originalLines.length; j++) {
                if (pos <= p + originalLines[j].length) return line;
                p += originalLines[j].length + 1;
                line++;
            }
            return line;
        }
        
        function findClose(start, tag) {
            let regex = new RegExp(`<cc\\.${tag}>`, 'i');
            let slice = content.substring(start);
            let match = slice.match(regex);
            if (!match) return null;
            let closeStart = start + match.index;
            let innerVal = content.substring(start, closeStart);
            let next = closeStart + match[0].length;
            return { inner: innerVal, next: next };
        }
        
        while (i < len) {
            let openMatch = content.substring(i).match(/<c\.([a-zA-Z]+)>/);
            if (!openMatch) {
                let rest = content.substring(i);
                if (rest.trim()) result += escapeHtml(rest);
                break;
            }
            
            let tag = openMatch[1].toLowerCase();
            let tagStart = i + openMatch.index;
            let innerStart = tagStart + openMatch[0].length;
            
            let closed = findClose(innerStart, tag);
            if (!closed) return { error: `Нет закрывающего <cc.${tag}>`, line: getLine(tagStart) };
            
            let innerRaw = closed.inner;
            let nextIdx = closed.next;
            
            switch (tag) {
                case 'button':
                    result += `<button style="background:#eef; border:1px solid #88a; padding:6px 16px; margin:4px; cursor:pointer;" data-has-js="false">${escapeHtml(innerRaw.trim()) || 'Кнопка'}</button>`;
                    break;
                case 'text':
                    result += `<div>${escapeHtml(innerRaw)}</div>`;
                    break;
                case 'title':
                    result += `<h2>${escapeHtml(innerRaw)}</h2>`;
                    break;
                case 'box': {
                    let innerParsed = parseInner(innerRaw, originalLines);
                    if (innerParsed.error) return innerParsed;
                    result += `<div style="border:1px solid #ccc; padding:12px; margin:8px 0;">${innerParsed.html}</div>`;
                    break;
                }
                case 'input':
                    result += `<input type="text" placeholder="${escapeHtml(innerRaw.trim())}" style="padding:5px; margin:4px 0; width:200px;">`;
                    break;
                case 'link': {
                    let parts = innerRaw.split('|');
                    let url = parts[0]?.trim() || '#';
                    let text = parts[1]?.trim() || innerRaw.trim();
                    result += `<a href="${escapeHtml(url)}" target="_blank">${escapeHtml(text)}</a>`;
                    break;
                }
                case 'style':
                    styles.push(innerRaw);
                    break;
                case 'script':
                    scripts.push(innerRaw);
                    break;
                case 'badge':
                    result += `<span style="background:#d4e0ec; padding:2px 8px; border-radius:20px;">${escapeHtml(innerRaw)}</span>`;
                    break;
                case 'select': {
                    let opts = innerRaw.split(',').map(s => `<option>${escapeHtml(s.trim())}</option>`).join('');
                    result += `<select style="padding:5px;">${opts}</select>`;
                    break;
                }
                case 'checkbox':
                    result += `<label><input type="checkbox"> ${escapeHtml(innerRaw)}</label><br>`;
                    break;
                case 'range':
                    result += `<input type="range" min="0" max="100" value="${escapeHtml(innerRaw) || 50}">`;
                    break;
                case 'textarea':
                    result += `<textarea rows="3" style="width:100%;" placeholder="${escapeHtml(innerRaw)}"></textarea>`;
                    break;
                case 'hr':
                    result += `<hr>`;
                    break;
                case 'center': {
                    let innerParsed = parseInner(innerRaw, originalLines);
                    if (innerParsed.error) return innerParsed;
                    result += `<div style="text-align:center;">${innerParsed.html}</div>`;
                    break;
                }
                case 'code':
                    result += `<code style="background:#f0f0f0; padding:2px 5px;">${escapeHtml(innerRaw)}</code>`;
                    break;
                default:
                    return { error: `Неизвестная команда: c.${tag}`, line: getLine(tagStart) };
            }
            i = nextIdx;
        }
        
        let styleBlock = styles.length ? `<style>${styles.join('\n')}</style>` : "";
        let scriptBlock = scripts.length ? `<script>${scripts.join('\n')}<\/script>` : "";
        return { html: styleBlock + result + scriptBlock };
    }
    
    function execute() {
        hideError();
        let src = editor.value;
        if (!src.trim()) {
            showError("Пустой код", 1);
            return;
        }
        let res = parseCRS(src);
        if (res.error) {
            showError(res.error, res.line || 1);
        } else {
            renderDiv.innerHTML = res.html;
            document.querySelectorAll('#render button').forEach(btn => {
                btn.addEventListener('click', (event) => {
                    if (btn.getAttribute('data-has-js') === 'true') {
                        alert(btn.innerText);
                    }
                });
            });
        }
    }
    
    function loadExample() {
        editor.value = `<CURSED-CODING>
<c.title> Тест кнопки <cc.title>
<c.text> Ниже должна быть кнопка: <cc.text>
<c.button> НАЖМИ МЕНЯ <cc.button>
<c.box>
  <c.text> Ещё одна кнопка внутри блока: <cc.text>
  <c.button> Кнопка 2 <cc.button>
<cc.box>
</CCURSED-CODING>`;
        execute();
    }
    
    document.getElementById('run').addEventListener('click', execute);
    document.getElementById('example').addEventListener('click', loadExample);
    loadExample();
</script>
</body>
</html>
