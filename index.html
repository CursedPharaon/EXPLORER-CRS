<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS Language Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e8ecf2; font-family: monospace; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border: 1px solid #aaa; }
        .header { background: #d9dfe8; padding: 10px 16px; border-bottom: 1px solid #999; font-weight: bold; font-size: 1.3rem; display: flex; justify-content: space-between; }
        .workspace { display: flex; flex-wrap: wrap; }
        .editor-panel { flex: 1.2; min-width: 450px; border-right: 1px solid #ccc; }
        .editor-header { background: #eef2f7; padding: 6px 12px; border-bottom: 1px solid #bbb; font-weight: bold; display: flex; justify-content: space-between; }
        .editor-with-lines { display: flex; background: #fefef7; }
        .line-numbers { background: #f0f2f5; padding: 12px 8px; text-align: right; font-family: monospace; font-size: 13px; line-height: 1.5; color: #888; border-right: 1px solid #ddd; min-width: 45px; }
        .line-numbers div { white-space: pre; }
        textarea { width: 100%; font-family: monospace; font-size: 13px; padding: 12px; border: none; background: #fefef7; resize: vertical; min-height: 450px; outline: none; }
        .button-bar { padding: 10px; background: #eef2f7; border-top: 1px solid #ccc; display: flex; gap: 10px; flex-wrap: wrap; }
        button { background: #e0e5ec; border: 1px solid #8a9cb0; padding: 6px 16px; font-family: monospace; font-weight: bold; cursor: pointer; }
        button:hover { background: #d0d8e4; }
        .output-panel { flex: 1; min-width: 350px; background: #fff; }
        .output-header { background: #eef2f7; padding: 6px 12px; border-bottom: 1px solid #bbb; font-weight: bold; }
        .render-area { padding: 16px; background: white; min-height: 500px; overflow-y: auto; }
        .error-box { background: #fff0ee; border-left: 5px solid #c00; padding: 10px; color: #a00; display: none; margin: 10px; }
        .user-panel { background: #eef2f7; padding: 5px 12px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        .crs-btn { background: #4CAF50; color: white; border: none; padding: 8px 16px; margin: 5px; border-radius: 4px; cursor: pointer; }
        .crs-input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; margin: 5px 0; box-sizing: border-box; }
        
        .custom-alert {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .custom-alert-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            min-width: 300px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .custom-alert-content p {
            margin-bottom: 20px;
            font-size: 16px;
            color: #333;
        }
        .custom-alert-content button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .custom-alert-content button:hover { background: #45a049; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; max-width: 400px; width: 90%; }
        .modal-content h3 { margin-bottom: 15px; }
        .modal-content input { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        .modal-content button { margin: 5px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; z-index: 1100; animation: fadeOut 3s forwards; }
        .toast.error { background: #c00; }
        .toast.success { background: #0a0; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .app-item { background: #f0f2f5; padding: 10px; margin: 10px 0; border-radius: 4px; cursor: pointer; }
        .app-item:hover { background: #e0e5ec; }
        .apps-modal { max-width: 600px; max-height: 80%; overflow: auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><div>CRS LANGUAGE EXPLORER</div><span>&lt;c.tag&gt; ... &lt;cc.tag&gt;</span></div>
    <div class="user-panel" id="userPanel">
        <span>👤 <span id="currentUser">Гость</span></span>
        <div>
            <button id="showLoginBtn">Войти</button>
            <button id="showRegisterBtn">Регистрация</button>
            <button id="logoutBtn" style="display:none;">Выйти</button>
        </div>
    </div>
    <div class="workspace">
        <div class="editor-panel">
            <div class="editor-header"><span>РЕДАКТОР CRS</span><span id="lineCountInfo">строк: 0</span></div>
            <div class="editor-with-lines">
                <div class="line-numbers" id="lineNumbers"></div>
                <textarea id="crsCode" rows="18"></textarea>
            </div>
            <div class="button-bar">
                <button id="runBtn">▶ ЗАПУСТИТЬ</button>
                <button id="saveAppBtn">💾 СОХРАНИТЬ</button>
                <button id="myAppsBtn">📱 МОИ</button>
                <button id="allAppsBtn">🌐 ВСЕ</button>
                <button id="resetExample">📋 ПРИМЕР</button>
                <button id="clearOutput">🗑 ОЧИСТИТЬ</button>
            </div>
        </div>
        <div class="output-panel">
            <div class="output-header">📺 РЕЗУЛЬТАТ</div>
            <div id="errorPanel" class="error-box"></div>
            <div id="renderContainer" class="render-area"></div>
        </div>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>Вход</h3>
        <input type="text" id="loginUsername" placeholder="Имя пользователя">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button id="loginSubmitBtn">Войти</button>
            <button id="closeLoginBtn">Отмена</button>
        </div>
    </div>
</div>

<div id="registerModal" class="modal">
    <div class="modal-content">
        <h3>Регистрация</h3>
        <input type="text" id="regUsername" placeholder="Имя пользователя">
        <input type="password" id="regPassword" placeholder="Пароль">
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button id="registerSubmitBtn">Зарегистрироваться</button>
            <button id="closeRegisterBtn">Отмена</button>
        </div>
    </div>
</div>

<div id="appsModal" class="modal">
    <div class="modal-content apps-modal">
        <h3 id="modalTitle">Приложения</h3>
        <div id="modalList"></div>
        <button id="closeAppsBtn">Закрыть</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://tmjqafqecjpizawdruzq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanFhZnFlY2pwaXphd2RydXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTk2OTYsImV4cCI6MjA5NTQ3NTY5Nn0.8K7i5QEbjYWSvqw78P8RSR_abYM8uCRZbvC9Hp12bac';
    
    let currentUser = null;
    
    // Переопределяем alert НАВСЕГДА
    window.alert = function(msg) {
        const old = document.querySelector('.custom-alert');
        if(old) old.remove();
        const div = document.createElement('div');
        div.className = 'custom-alert';
        div.innerHTML = `<div class="custom-alert-content"><p>${String(msg).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}</p><button onclick="this.closest('.custom-alert').remove()">OK</button></div>`;
        document.body.appendChild(div);
    };
    
    function showToast(msg, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!username || !password) { showToast("Заполните все поля", "error"); return; }
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/crs_users`, {
                method: 'POST', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (response.ok) {
                showToast("Регистрация успешна! Войдите.", "success");
                document.getElementById('registerModal').style.display = 'none';
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('loginUsername').value = username;
                document.getElementById('loginPassword').value = password;
                document.getElementById('loginModal').style.display = 'flex';
            } else { showToast("Пользователь уже существует", "error"); }
        } catch(e) { showToast("Ошибка", "error"); }
    }
    
    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) { showToast("Заполните все поля", "error"); return; }
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/crs_users?username=eq.${encodeURIComponent(username)}&select=*`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            const users = await response.json();
            if (users && users.length > 0 && users[0].password === password) {
                currentUser = { id: users[0].id, username: users[0].username };
                localStorage.setItem('crs_user', JSON.stringify(currentUser));
                updateUI();
                document.getElementById('loginModal').style.display = 'none';
                showToast("Добро пожаловать, " + currentUser.username + "!", "success");
            } else { showToast("Неверные имя или пароль", "error"); }
        } catch(e) { showToast("Ошибка", "error"); }
    }
    
    function logout() { currentUser = null; localStorage.removeItem('crs_user'); updateUI(); showToast("Вы вышли", "info"); }
    function updateUI() {
        if (currentUser) {
            document.getElementById('currentUser').innerText = currentUser.username;
            document.getElementById('showLoginBtn').style.display = 'none';
            document.getElementById('showRegisterBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        } else {
            document.getElementById('currentUser').innerText = "Гость";
            document.getElementById('showLoginBtn').style.display = 'inline-block';
            document.getElementById('showRegisterBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
        }
    }
    
    async function saveApp() {
        if (!currentUser) { showToast("Сначала войдите", "error"); return; }
        const title = prompt("Название приложения:");
        if (!title) return;
        const code = document.getElementById('crsCode').value;
        if (!code) { showToast("Код пуст", "error"); return; }
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/crs_apps`, {
                method: 'POST', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, code, author_id: currentUser.id, is_public: true, is_hidden: false })
            });
            if (response.ok) showToast("Сохранено!", "success");
            else showToast("Ошибка", "error");
        } catch(e) { showToast("Ошибка", "error"); }
    }
    
    async function getMyApps() {
        if (!currentUser) return [];
        const response = await fetch(`${SUPABASE_URL}/rest/v1/crs_apps?author_id=eq.${currentUser.id}&select=*`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        return await response.json();
    }
    
    async function getAllApps() {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/crs_apps?select=*&order=created_at.desc`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        return await response.json();
    }
    
    function parseCRS(code) {
        let html = ''; let scripts = []; let i = 0;
        while (i < code.length) {
            const openMatch = code.substring(i).match(/<c\.([a-zA-Z]+)>/);
            if (!openMatch) break;
            const tag = openMatch[1].toLowerCase();
            const contentStart = i + openMatch.index + openMatch[0].length;
            const closeTag = `<cc.${tag}>`;
            const closePos = code.indexOf(closeTag, contentStart);
            if (closePos === -1) break;
            const innerRaw = code.substring(contentStart, closePos);
            i = closePos + closeTag.length;
            if (tag === 'button') html += `<button class="crs-btn" style="background:#4CAF50; color:white; border:none; padding:8px 16px; margin:5px; border-radius:4px; cursor:pointer;">${escapeHtml(innerRaw.trim()) || 'Кнопка'}</button>`;
            else if (tag === 'input') html += `<input type="text" class="crs-input" placeholder="${escapeHtml(innerRaw.trim())}" style="padding:8px; border:1px solid #ccc; border-radius:4px; margin:5px 0; width:100%;">`;
            else if (tag === 'text') html += `<div>${escapeHtml(innerRaw)}</div>`;
            else if (tag === 'title') html += `<h2>${escapeHtml(innerRaw)}</h2>`;
            else if (tag === 'script') scripts.push(innerRaw);
            else html += `<div>${escapeHtml(innerRaw)}</div>`;
        }
        return { html, scripts };
    }
    
    function executeCRS(code) {
        const openTag = "<CURSED-CODING>";
        const closeTag = "</CCURSED-CODING>";
        const openIdx = code.indexOf(openTag);
        const closeIdx = code.indexOf(closeTag);
        if (openIdx === -1 || closeIdx === -1) {
            document.getElementById('renderContainer').innerHTML = '<div style="color:#b00;">Ошибка: нет тегов</div>';
            return;
        }
        const inner = code.substring(openIdx + openTag.length, closeIdx);
        const { html, scripts } = parseCRS(inner);
        const renderDiv = document.getElementById('renderContainer');
        renderDiv.innerHTML = html;
        setTimeout(() => {
            scripts.forEach(scriptContent => {
                const script = document.createElement('script');
                script.textContent = scriptContent;
                renderDiv.appendChild(script);
            });
        }, 10);
    }
    
    async function loadApp(app) {
        if (app.is_hidden) {
            document.getElementById('crsCode').value = '⚠️ КОД СКРЫТ ⚠️';
            executeCRS(app.code);
            updateLineNumbers();
            showToast("Загружено (hidden): " + app.title, "info");
            return;
        }
        document.getElementById('crsCode').value = app.code;
        updateLineNumbers();
        executeCRS(app.code);
        showToast("Загружено: " + app.title, "success");
    }
    
    async function showMyApps() {
        const apps = await getMyApps();
        const modal = document.getElementById('appsModal');
        const list = document.getElementById('modalList');
        document.getElementById('modalTitle').innerText = "Мои приложения";
        list.innerHTML = '';
        if (apps.length === 0) { list.innerHTML = '<div style="padding:20px; text-align:center;">Нет приложений</div>'; }
        for (let app of apps) {
            let div = document.createElement('div');
            div.className = 'app-item';
            div.innerHTML = `<strong>${escapeHtml(app.title)}</strong><br><small>${new Date(app.created_at).toLocaleString()}</small>`;
            div.onclick = () => { loadApp(app); modal.style.display = 'none'; };
            list.appendChild(div);
        }
        modal.style.display = 'flex';
    }
    
    async function showAllApps() {
        const apps = await getAllApps();
        const modal = document.getElementById('appsModal');
        const list = document.getElementById('modalList');
        document.getElementById('modalTitle').innerText = "Все приложения";
        list.innerHTML = '';
        for (let app of apps) {
            let div = document.createElement('div');
            div.className = 'app-item';
            div.innerHTML = `<strong>${escapeHtml(app.title)}</strong><br><small>Автор: ${app.author_id} | ${new Date(app.created_at).toLocaleString()}</small>`;
            div.onclick = () => { loadApp(app); modal.style.display = 'none'; };
            list.appendChild(div);
        }
        modal.style.display = 'flex';
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    const editor = document.getElementById('crsCode');
    const lineNumbersDiv = document.getElementById('lineNumbers');
    const lineCountInfo = document.getElementById('lineCountInfo');
    
    function updateLineNumbers() {
        const lines = editor.value.split(/\r?\n/);
        lineCountInfo.textContent = `строк: ${lines.length}`;
        let html = '';
        for (let i = 1; i <= lines.length; i++) html += `<div>${i}</div>`;
        lineNumbersDiv.innerHTML = html;
    }
    editor.addEventListener('input', updateLineNumbers);
    editor.addEventListener('scroll', () => { lineNumbersDiv.scrollTop = editor.scrollTop; });
    
    document.getElementById('runBtn').onclick = () => executeCRS(editor.value);
    document.getElementById('saveAppBtn').onclick = saveApp;
    document.getElementById('myAppsBtn').onclick = showMyApps;
    document.getElementById('allAppsBtn').onclick = showAllApps;
    document.getElementById('resetExample').onclick = () => {
        editor.value = `<CURSED-CODING>
<c.title> Приветственная программа <cc.title>
<c.text> Введите ваше имя: <cc.text>
<c.input> <cc.input>
<c.button> Поздороваться <cc.button>
<c.script>
  let btn = document.querySelector('.crs-btn');
  let inp = document.querySelector('.crs-input');
  btn.onclick = function() {
    let name = inp.value;
    if (name && name.trim()) alert('Привет, ' + name.trim() + '!');
    else alert('Введите имя!');
  };
<cc.script>
</CCURSED-CODING>`;
        updateLineNumbers();
        executeCRS(editor.value);
    };
    document.getElementById('clearOutput').onclick = () => { document.getElementById('renderContainer').innerHTML = '<div style="color:#aaa;">Очищено</div>'; };
    
    document.getElementById('showLoginBtn').onclick = () => document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('showRegisterBtn').onclick = () => document.getElementById('registerModal').style.display = 'flex';
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('loginSubmitBtn').onclick = login;
    document.getElementById('closeLoginBtn').onclick = () => document.getElementById('loginModal').style.display = 'none';
    document.getElementById('registerSubmitBtn').onclick = register;
    document.getElementById('closeRegisterBtn').onclick = () => document.getElementById('registerModal').style.display = 'none';
    document.getElementById('closeAppsBtn').onclick = () => document.getElementById('appsModal').style.display = 'none';
    
    window.onclick = (e) => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
    
    async function updateSecretBank() {
        const correctCode = `<CURSED-CODING>
<c.title> СЕКРЕТНЫЙ БАНК <cc.title>
<c.text> Введите PIN-код: <cc.text>
<c.input> <cc.input>
<c.button> Войти <cc.button>
<c.script>
  let FLAG = "CRS{BANK_HACK_2024}";
  let PIN = "1337";
  let btn = document.querySelector('.crs-btn');
  let inp = document.querySelector('.crs-input');
  btn.onclick = function() {
    if (inp.value === PIN) alert("Доступ разрешён! Флаг: " + FLAG);
    else alert("Неверный PIN!");
  };
<cc.script>
</CCURSED-CODING>`;
        try {
            await fetch(`${SUPABASE_URL}/rest/v1/crs_apps?title=eq.Секретный банк`, {
                method: 'PATCH', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: correctCode, is_hidden: true })
            });
        } catch(e) {}
    }
    updateSecretBank();
    
    const saved = localStorage.getItem('crs_user');
    if (saved) { try { currentUser = JSON.parse(saved); updateUI(); } catch(e) {} }
    updateUI();
    updateLineNumbers();
    executeCRS(editor.value);
</script>
</body>
</html>
