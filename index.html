<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRS Explorer</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#e8ecf2; font-family:'Courier New',monospace; padding:20px; }
        .container { max-width:1400px; margin:0 auto; background:white; border:1px solid #aaa; border-radius:8px; overflow:hidden; }
        .header { background:#d9dfe8; padding:10px 16px; border-bottom:1px solid #999; font-weight:bold; font-size:1.3rem; display:flex; justify-content:space-between; }
        .workspace { display:flex; flex-wrap:wrap; }
        .editor-panel { flex:1.2; min-width:450px; border-right:1px solid #ccc; }
        .editor-header { background:#eef2f7; padding:6px 12px; border-bottom:1px solid #bbb; font-weight:bold; display:flex; justify-content:space-between; }
        .editor-with-lines { display:flex; background:#fefef7; }
        .line-numbers { background:#f0f2f5; padding:12px 8px; text-align:right; font-family:monospace; font-size:13px; line-height:1.5; color:#888; border-right:1px solid #ddd; min-width:45px; }
        .line-numbers div { white-space:pre; }
        textarea { width:100%; font-family:monospace; font-size:13px; padding:12px; border:none; background:#fefef7; resize:vertical; min-height:450px; outline:none; }
        .button-bar { padding:10px; background:#eef2f7; border-top:1px solid #ccc; display:flex; gap:10px; flex-wrap:wrap; }
        button { background:#e0e5ec; border:1px solid #8a9cb0; padding:6px 16px; font-family:monospace; font-weight:bold; cursor:pointer; }
        button:hover { background:#d0d8e4; }
        .output-panel { flex:1; min-width:350px; background:#fff; display:flex; flex-direction:column; }
        .output-header { background:#eef2f7; padding:6px 12px; border-bottom:1px solid #bbb; font-weight:bold; }
        .render-area { padding:16px; background:white; min-height:500px; overflow-y:auto; }
        .error-box { background:#fff0ee; border-left:5px solid #c00; padding:10px; color:#a00; display:none; margin:10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><div>KRS LANGUAGE EXPLORER</div><span>&lt;c.тег&gt; ... &lt;/c.тег&gt;</span></div>
    <div class="workspace">
        <div class="editor-panel">
            <div class="editor-header"><span>РЕДАКТОР КРС</span><span id="lineCountInfo">строк: 0</span></div>
            <div class="editor-with-lines">
                <div class="line-numbers" id="lineNumbers"></div>
                <textarea id="crsCode" rows="18"><CURSED-CODING>
<c.title>🌟 Привет, мир!</c.title>
<c.box>
<c.text>Добро пожаловать в KRS Language!</c.text>
<c.button>Нажми меня</c.button>
</c.box>
</CCURSED-CODING></textarea>
            </div>
            <div class="button-bar">
                <button id="runBtn">▶ ЗАПУСТИТЬ</button>
                <button id="clearOutput">🗑 ОЧИСТИТЬ</button>
                <button id="copyBtn">📋 Копировать HTML</button>
                <button id="downloadBtn">📥 Скачать HTML</button>
            </div>
        </div>
        <div class="output-panel">
            <div class="output-header">📺 РЕЗУЛЬТАТ</div>
            <div id="errorPanel" class="error-box"></div>
            <div id="renderContainer" class="render-area"></div>
        </div>
    </div>
</div>

<script>
var lastHtml = '';

function compileKRS(code) {
    code = code.replace(/<CURSED-CODING>/gi,'').replace(/<\/CCURSED-CODING>/gi,'');
    
    // Извлекаем стили до обработки
    var styles = '';
    code = code.replace(/<c\.style>([\s\S]*?)<\/c\.style>/gi, function(m, c) {
        var css = '';
        var blocks = c.match(/([#.\w-]+)\s*\{([^}]*)\}/g);
        if (blocks) {
            blocks.forEach(function(b) {
                var sel = b.match(/([#.\w-]+)\s*\{/)[1];
                var body = b.match(/\{([^}]*)\}/)[1];
                css += sel + '{';
                body.split('\n').forEach(function(l) {
                    l = l.trim();
                    if (l.includes('=')) {
                        var p = l.split('=');
                        var prop = p[0].trim().replace('фон','background').replace('цвет','color').replace('отступ','padding').replace('углы','border-radius').replace('ширина','width').replace('высота','height').replace('тень','box-shadow').replace('шрифт','font-size');
                        var val = p[1].trim();
                        var cols = {'синий':'#2196F3','тёмно-синий':'#1565C0','красный':'#f44336','зелёный':'#4CAF50','фиолетовый':'#7c3aed','белый':'#fff','чёрный':'#000','жёлтый':'#ffc107','оранжевый':'#ff9800','розовый':'#e91e63','серый':'#9e9e9e'};
                        for (var k in cols) val = val.replace(k, cols[k]);
                        css += prop + ':' + val + ';';
                    }
                });
                css += '}';
            });
        }
        styles += css;
        return '';
    });
    
    // Извлекаем скрипты
    var scripts = '';
    code = code.replace(/<c\.script>([\s\S]*?)<\/c\.script>/gi, function(m, c) {
        scripts += '<script>' + c + '<\/script>';
        return '';
    });
    
    // 65 команд
    var tags = [
        ['title','h1 class="crs-title"'],
        ['subtitle','h2 class="crs-subtitle"'],
        ['heading','h3 class="crs-heading"'],
        ['text','p class="crs-text"'],
        ['span','span'],
        ['card','div class="crs-card"'],
        ['box','div class="crs-box"'],
        ['grid','div class="crs-grid"'],
        ['flex','div class="crs-flex"'],
        ['center','div class="crs-center"'],
        ['container','div class="crs-container"'],
        ['button','button class="crs-btn"'],
        ['input','input class="crs-input" placeholder="'],
        ['textarea','textarea class="crs-textarea" placeholder="'],
        ['select','select class="crs-select"'],
        ['option','option'],
        ['checkbox','label class="crs-checkbox"><input type="checkbox"> '],
        ['radio','label class="crs-radio"><input type="radio"> '],
        ['number','input type="number" class="crs-number" placeholder="'],
        ['date','input type="date" class="crs-date"'],
        ['time','input type="time" class="crs-time"'],
        ['color','input type="color" class="crs-color" value="'],
        ['range','input type="range" class="crs-range" value="'],
        ['email','input type="email" class="crs-input" placeholder="'],
        ['password','input type="password" class="crs-input" placeholder="'],
        ['search','input type="search" class="crs-input" placeholder="'],
        ['image','img class="crs-image" src="'],
        ['video','video class="crs-video" src="'],
        ['audio','audio class="crs-audio" src="'],
        ['link','a class="crs-link" href="'],
        ['iframe','iframe class="crs-iframe" src="'],
        ['svg','svg'],
        ['list','ul class="crs-list"'],
        ['olist','ol class="crs-olist"'],
        ['item','li'],
        ['menu','menu'],
        ['table','table class="crs-table"'],
        ['row','tr'],
        ['header','th'],
        ['cell','td'],
        ['badge','span class="crs-badge"'],
        ['mark','mark'],
        ['code','pre class="crs-code"><code>'],
        ['alert','div class="crs-alert"'],
        ['progress','progress class="crs-progress" value="'],
        ['tooltip','span class="crs-tooltip" title="'],
        ['quote','blockquote'],
        ['divider','hr'],
        ['details','details class="crs-details"'],
        ['summary','summary'],
        ['spacer','div style="height:'],
        ['br','br'],
        ['header_section','header'],
        ['footer_section','footer'],
        ['nav','nav'],
        ['section','section'],
        ['aside','aside'],
        ['meter','meter value="'],
        ['output','output'],
        ['button_link','a class="crs-btn" href="'],
        ['file','input type="file"'],
        ['hidden','input type="hidden" value="'],
        ['html','']
    ];
    
    for (var i = 0; i < tags.length; i++) {
        var t = tags[i][0];
        var h = tags[i][1];
        var close = '</' + h.split(' ')[0] + '>';
        
        if (t === 'input' || t === 'number' || t === 'email' || t === 'password' || t === 'search') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1">');
        } else if (t === 'image' || t === 'video' || t === 'audio' || t === 'link' || t === 'iframe' || t === 'color' || t === 'range' || t === 'button_link' || t === 'hidden') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1">' + (t === 'audio' || t === 'video' ? '</' + h.split(' ')[0] + '>' : t === 'link' ? '</a>' : t === 'button_link' ? '</a>' : ''));
        } else if (t === 'checkbox') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1</label>');
        } else if (t === 'radio') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1</label>');
        } else if (t === 'code') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1</code></pre>');
        } else if (t === 'tooltip') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1">$1</span>');
        } else if (t === 'progress' || t === 'meter') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1" max="100"></' + h.split(' ')[0] + '>');
        } else if (t === 'spacer') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '$1px;"></div>');
        } else if (t === 'br' || t === 'file' || t === 'divider') {
            code = code.replace(new RegExp('<c\\.' + t + '>.*?</c\\.' + t + '>', 'gi'), '<' + h + '>');
        } else if (t === 'html') {
            code = code.replace(new RegExp('<c\\.' + t + '>([\\s\\S]*?)</c\\.' + t + '>', 'gi'), '$1');
        } else if (t === 'svg') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '>$1</svg>');
        } else if (t === 'date' || t === 'time') {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '>');
        } else {
            code = code.replace(new RegExp('<c\\.' + t + '>(.*?)</c\\.' + t + '>', 'gi'), '<' + h + '>$1' + close);
        }
    }
    
    var baseCSS = '*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;padding:20px}.crs-title{font-size:32px;color:#7c3aed;margin:10px 0}.crs-subtitle{font-size:24px;color:#555}.crs-heading{font-size:18px}.crs-text{font-size:16px}.crs-btn{background:#7c3aed;color:#fff;padding:12px 24px;border:none;border-radius:12px;cursor:pointer;margin:5px;display:inline-block;text-decoration:none}.crs-input{padding:12px;border:1px solid #ccc;border-radius:8px;width:100%;margin:5px 0;font-size:16px}.crs-card{background:#f5f5f5;padding:20px;border-radius:15px;margin:10px 0}.crs-box{border:1px solid #ddd;padding:20px;border-radius:12px;margin:10px 0}.crs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}.crs-flex{display:flex;gap:15px;flex-wrap:wrap}.crs-center{text-align:center}.crs-container{max-width:1200px;margin:0 auto}.crs-badge{background:#7c3aed;color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;display:inline-block}.crs-alert{background:#fff3cd;border-left:4px solid #ffc107;padding:15px;margin:10px 0}.crs-code{background:#1e1e1e;color:#d4d4d4;padding:15px;border-radius:8px;font-family:monospace}.crs-table{border-collapse:collapse;width:100%}.crs-table td,.crs-table th{border:1px solid #ddd;padding:8px}.crs-table th{background:#f5f5f5}.crs-image{max-width:100%;border-radius:12px}.crs-video,.crs-audio{max-width:100%}.crs-link{color:#007acc}.crs-textarea{padding:12px;border:1px solid #ccc;border-radius:8px;width:100%;resize:vertical;min-height:100px}.crs-select{padding:12px;border:1px solid #ccc;border-radius:8px;width:100%}.crs-checkbox,.crs-radio{display:block;margin:5px 0}.crs-progress{width:100%}.crs-tooltip{border-bottom:1px dotted #666;cursor:help}blockquote{border-left:4px solid #7c3aed;padding:10px 20px;margin:10px 0;background:#f9f9f9}header,footer{background:#333;color:#fff;padding:20px}nav{background:#555;color:#fff;padding:10px}section{padding:20px;margin:10px 0}aside{background:#f5f5f5;padding:15px;border-radius:10px}.crs-audio{width:100%}';
    
    return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KRS App</title><style>' + baseCSS + styles + '</style></head><body>' + code + scripts + '</body></html>';
}

function executeKRS() {
    var code = document.getElementById('crsCode').value;
    var html = compileKRS(code);
    lastHtml = html;
    document.getElementById('renderContainer').innerHTML = html;
}

// Кнопки
document.getElementById('runBtn').onclick = executeKRS;
document.getElementById('clearOutput').onclick = function() {
    document.getElementById('renderContainer').innerHTML = '<div style="color:#aaa;text-align:center;padding:40px;">✨ Результат появится здесь ✨</div>';
};

document.getElementById('copyBtn').onclick = function() {
    if (!lastHtml) { alert('Сначала запустите код!'); return; }
    navigator.clipboard.writeText(lastHtml).then(function() {
        alert('✅ HTML скопирован!');
    });
};

document.getElementById('downloadBtn').onclick = function() {
    if (!lastHtml) { alert('Сначала запустите код!'); return; }
    var blob = new Blob([lastHtml], {type: 'text/html'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    a.click();
};

// Номера строк
var editor = document.getElementById('crsCode');
var lineNumbersDiv = document.getElementById('lineNumbers');
var lineCountInfo = document.getElementById('lineCountInfo');

function updateLineNumbers() {
    var lines = editor.value.split('\n');
    lineCountInfo.textContent = 'строк: ' + lines.length;
    var html = '';
    for (var i = 1; i <= lines.length; i++) html += '<div>' + i + '</div>';
    lineNumbersDiv.innerHTML = html;
}

editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('scroll', function() {
    lineNumbersDiv.scrollTop = editor.scrollTop;
});

updateLineNumbers();
executeKRS();
</script>
</body>
</html>
