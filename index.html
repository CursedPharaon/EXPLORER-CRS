<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KRS App</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#1a1a2e; color:#fff; padding:20px; }
        .crs-btn { background:#7c3aed; color:#fff; padding:12px 24px; border:none; border-radius:12px; font-size:16px; cursor:pointer; margin:5px; }
        .crs-input { padding:12px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#fff; width:100%; margin:5px 0; font-size:16px; }
        .crs-card { background:rgba(255,255,255,0.05); border-radius:20px; padding:25px; margin:10px 0; }
        .crs-title { font-size:32px; font-weight:bold; color:#a78bfa; margin:10px 0; }
        .crs-text { font-size:16px; margin:10px 0; color:rgba(255,255,255,0.8); }
        .crs-badge { background:#7c3aed; padding:4px 10px; border-radius:20px; font-size:12px; display:inline-block; }
        .crs-alert { background:rgba(255,193,7,0.1); border-left:4px solid #ffc107; padding:12px; border-radius:8px; margin:10px 0; color:#ffc107; }
        .crs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:15px; }
        .crs-box { border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:20px; margin:10px 0; }
    </style>
    </head><body>

<h1 class="crs-title">Привет, мир!</h1>

<div class="crs-box">
<p class="crs-text">Это сайт на языке КРС</p>
<button class="crs-btn">Нажми меня</button>
</div>

<div class="crs-grid">
<div class="crs-card">
<h1 class="crs-title">Карточка 1</h1>
<p class="crs-text">Описание товара</p>
<span class="crs-badge">Новинка</span>
</div>
<div class="crs-card">
<h1 class="crs-title">Карточка 2</h1>
<button class="crs-btn">Купить</button>
</div>
</div>

<input class="crs-input" placeholder="Введи имя">
<div class="crs-alert">Важное сообщение!</div>

<div style="height:20px;"></div>

</body></html>
