<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRS Compiler</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Courier New',monospace; background:#0a0a1a; height:100vh; display:flex; flex-direction:column; }
        .toolbar { background:#1a1a2e; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #7c3aed; }
        .toolbar h1 { font-size:18px; background:linear-gradient(135deg,#a78bfa,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .run-btn { background:#7c3aed; color:#fff; border:none; padding:12px 30px; border-radius:25px; font-size:16px; font-weight:bold; cursor:pointer; }
        textarea { flex:1; background:#0f0c29; color:#c4b5fd; border:none; padding:20px; font-family:'Courier New',monospace; font-size:14px; line-height:1.6; resize:none; outline:none; }
        .preview-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#1a1a2e; z-index:9999; flex-direction:column; }
        .preview-overlay.active { display:flex; }
        .preview-header { padding:10px 20px; display:flex; justify-content:flex-end; background:#0f0c29; }
        .close-btn { background:rgba(255,255,255,0.1); color:#fff; border:none; width:35px; height:35px; border-radius:50%; font-size:20px; cursor:pointer; }
        iframe { flex:1; border:none; background:#fff; }
    </style>
</head>
<body>

<div class="toolbar">
    <h1>🔮 KRS COMPILER</h1>
    <button class="run-btn" onclick="compile()">▶ ЗАПУСТИТЬ</button>
</div>

<textarea id="code"><CURSED-CODING>

<c.title>Привет!</c.title>
<c.text>Мой сайт</c.text>
<c.button>Нажми</c.button>

</CCURSED-CODING></textarea>

<div class="preview-overlay" id="previewOverlay">
    <div class="preview-header">
        <button class="close-btn" onclick="closePreview()">✕</button>
    </div>
    <iframe id="previewFrame"></iframe>
</div>

<script>
function compile() {
    var code = document.getElementById('code').value;
    
    code = code.replace(/<CURSED-CODING>/gi, '').replace(/<\/CCURSED-CODING>/gi, '');
    
    code = code.replace(/<c\.title>(.*?)<\/c\.title>/gi, '<h1 style="font-size:28px;color:#a78bfa;margin:10px 0;">$1</h1>');
    code = code.replace(/<c\.text>(.*?)<\/c\.text>/gi, '<p style="font-size:16px;color:#333;margin:10px 0;">$1</p>');
    code = code.replace(/<c\.button>(.*?)<\/c\.button>/gi, '<button style="background:#7c3aed;color:#fff;padding:12px 24px;border:none;border-radius:12px;font-size:16px;cursor:pointer;margin:5px;">$1</button>');
    code = code.replace(/<c\.input>(.*?)<\/c\.input>/gi, '<input style="padding:12px;border-radius:8px;border:1px solid #ccc;width:100%;margin:5px 0;font-size:16px;" placeholder="$1">');
    code = code.replace(/<c\.card>(.*?)<\/c\.card>/gi, '<div style="background:#f5f5f5;border-radius:20px;padding:25px;margin:10px 0;">$1</div>');
    code = code.replace(/<c\.box>(.*?)<\/c\.box>/gi, '<div style="border:1px solid #ddd;border-radius:12px;padding:20px;margin:10px 0;">$1</div>');
    code = code.replace(/<c\.grid>(.*?)<\/c\.grid>/gi, '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;">$1</div>');
    code = code.replace(/<c\.badge>(.*?)<\/c\.badge>/gi, '<span style="background:#7c3aed;color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;">$1</span>');
    code = code.replace(/<c\.alert>(.*?)<\/c\.alert>/gi, '<div style="background:#fff3cd;border-left:4px solid #ffc107;padding:15px;border-radius:8px;margin:10px 0;">$1</div>');
    code = code.replace(/<c\.spacer>(\d+)<\/c\.spacer>/gi, '<div style="height:$1px;"></div>');
    
    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body style="font-family:Arial;padding:20px;">' + code + '</body></html>';
    
    document.getElementById('previewFrame').srcdoc = html;
    document.getElementById('previewOverlay').classList.add('active');
}

function closePreview() {
    document.getElementById('previewOverlay').classList.remove('active');
}
</script>

</body>
</html>
